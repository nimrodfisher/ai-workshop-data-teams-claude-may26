    </marker>
  </defs>

  <!-- PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP HEADER PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP -->
  <text x="30" y="-90" font-size="26" fill="#1e40af" font-weight="bold">AI Analyst &#8212; 7-Phase Analysis Flow</text>
  <text x="30" y="-56" font-size="12" fill="#64748b">7 phases &#xB7; 6 user-confirmed checkpoints &#xB7; checkpoint-gated &#xB7; learning loop feeds every new analysis</text>
  <line x1="30" y1="-38" x2="672" y2="-38" stroke="#1e3a5f" stroke-width="2"/>
  <text x="170" y="-20" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">ANALYSIS PIPELINE</text>
  <text x="515" y="-20" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">AGENT&#8217;S CHAIN OF THOUGHT</text>

  <!-- PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP START PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP -->
  <ellipse cx="170" cy="28" rx="105" ry="28" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="170" y="28" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#374151">Business Question</text>
  <line x1="170" y1="58" x2="170" y2="87" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>

