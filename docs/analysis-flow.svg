  <text x="515" y="302" text-anchor="middle" font-size="13" fill="#374151">Is this data trustworthy?</text>
  <text x="515" y="324" text-anchor="middle" font-size="13" fill="#374151">What breaks if I&#8217;m wrong?</text>

  <line x1="170" y1="350" x2="170" y2="369" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>
  <polygon points="170,372 255,397 170,422 85,397" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="170" y="397" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#374151">&#10003; Checkpoint</text>
  <line x1="170" y1="424" x2="170" y2="443" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>

