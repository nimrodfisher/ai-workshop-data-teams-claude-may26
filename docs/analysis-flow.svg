  <rect x="30" y="624" width="280" height="80" rx="8" fill="#3b82f6" stroke="#1e3a5f" stroke-width="2"/>
  <text x="170" y="659" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">4 &#8212; Deep Analysis</text>
  <text x="170" y="681" text-anchor="middle" font-size="12" fill="#bfdbfe">Quantify effects, decompose</text>
  <line x1="313" y1="664" x2="368" y2="664" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-cot)"/>
  <rect x="370" y="626" width="290" height="76" rx="8" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1"/>
  <text x="515" y="658" text-anchor="middle" font-size="13" fill="#374151">What&#8217;s actually driving this?</text>
  <text x="515" y="680" text-anchor="middle" font-size="13" fill="#374151">How large is the effect?</text>

  <line x1="170" y1="706" x2="170" y2="725" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>
  <polygon points="170,728 255,753 170,778 85,753" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="170" y="753" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#374151">&#10003; Checkpoint</text>
  <line x1="170" y1="780" x2="170" y2="799" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>

