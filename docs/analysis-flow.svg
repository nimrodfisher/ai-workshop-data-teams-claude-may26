  <text x="170" y="859" text-anchor="middle" font-size="12" fill="#1e3a5f">Evidence mapped to hypotheses</text>
  <line x1="313" y1="842" x2="368" y2="842" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-cot)"/>
  <rect x="370" y="804" width="290" height="76" rx="8" fill="#e0f2fe" stroke="#1e3a5f" stroke-width="1"/>
  <text x="515" y="836" text-anchor="middle" font-size="13" fill="#374151">Which hypotheses does evidence</text>
  <text x="515" y="858" text-anchor="middle" font-size="13" fill="#374151">actually support?</text>

  <line x1="170" y1="884" x2="170" y2="903" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>
  <polygon points="170,906 255,931 170,956 85,931" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="170" y="931" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#374151">&#10003; Checkpoint</text>
  <line x1="170" y1="958" x2="170" y2="977" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>

