  <line x1="313" y1="486" x2="368" y2="486" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-cot)"/>
  <rect x="370" y="448" width="290" height="76" rx="8" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
  <text x="515" y="480" text-anchor="middle" font-size="13" fill="#374151">What patterns exist?</text>
  <text x="515" y="502" text-anchor="middle" font-size="13" fill="#374151">What&#8217;s surprising vs. expected?</text>

  <line x1="170" y1="528" x2="170" y2="547" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>
  <polygon points="170,550 255,575 170,600 85,575" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
