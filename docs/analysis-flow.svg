  <text x="170" y="1015" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">6 &#8212; Validation</text>
  <text x="170" y="1037" text-anchor="middle" font-size="12" fill="#b45309">Sensitivity + red-team checks</text>
  <line x1="313" y1="1020" x2="368" y2="1020" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-cot)"/>
  <rect x="370" y="982" width="290" height="76" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1"/>
  <text x="515" y="1014" text-anchor="middle" font-size="13" fill="#374151">What would a skeptic attack?</text>
  <text x="515" y="1036" text-anchor="middle" font-size="13" fill="#374151">Am I missing something?</text>

  <line x1="170" y1="1062" x2="170" y2="1081" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>
  <polygon points="170,1084 255,1109 170,1134 85,1109" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="170" y="1109" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#374151">&#10003; Checkpoint</text>
  <line x1="170" y1="1136" x2="170" y2="1155" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP PHASE 7 PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP -->
  <rect x="30" y="1158" width="280" height="80" rx="8" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="170" y="1193" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">7 &#8212; Data Storytelling</text>
  <text x="170" y="1215" text-anchor="middle" font-size="12" fill="#047857">report.html + summary.pdf</text>
  <line x1="313" y1="1198" x2="368" y2="1198" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-cot)"/>
  <rect x="370" y="1160" width="290" height="76" rx="8" fill="#ecfdf5" stroke="#047857" stroke-width="1"/>
  <text x="515" y="1192" text-anchor="middle" font-size="13" fill="#374151">What decision does this enable?</text>
  <text x="515" y="1214" text-anchor="middle" font-size="13" fill="#374151">One-sentence finding for exec.</text>

  <line x1="170" y1="1240" x2="170" y2="1259" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP END PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP -->
  <ellipse cx="170" cy="1292" rx="115" ry="30" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="170" y="1292" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#374151">Deliverables Ready</text>

  <!-- PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP LEARNING LOOP PPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPPP -->
  <path d="M 55 1292 L -60 1292 L -60 28 L 65 28" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="9,5" marker-end="url(#arr-loop)"/>
  <text x="-102" y="638" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="bold">Learning</text>
  <text x="-102" y="654" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="bold">Loop</text>
  <text x="-102" y="682" text-anchor="middle" font-size="10" fill="#94a3b8">analyses.md</text>
  <text x="-102" y="696" text-anchor="middle" font-size="10" fill="#94a3b8">corrections.md</text>
  <text x="-102" y="710" text-anchor="middle" font-size="10" fill="#94a3b8">known_issues.md</text>
