<svg xmlns="http://www.w3.org/2000/svg" viewBox="-210 -130 890 1500" width="890" height="1500" style="background:#ffffff; font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;">
  <defs>
    <marker id="arr-main" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#64748b"/>
