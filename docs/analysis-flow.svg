  <text x="170" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">1 &#8212; Hypothesis Framer</text>
  <text x="170" y="147" text-anchor="middle" font-size="12" fill="#6d28d9">Hypotheses + success criteria</text>
  <line x1="313" y1="130" x2="368" y2="130" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-cot)"/>
  <rect x="370" y="92" width="290" height="76" rx="8" fill="#f5f3ff" stroke="#6d28d9" stroke-width="1"/>
  <text x="515" y="124" text-anchor="middle" font-size="13" fill="#374151">What would falsify this?</text>
  <text x="515" y="146" text-anchor="middle" font-size="13" fill="#374151">What data do I need?</text>

  <line x1="170" y1="172" x2="170" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arr-main)"/>
  <polygon points="170,194 255,219 170,244 85,219" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="170" y="219" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#374151">&#10003; Checkpoint</text>
