<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Account-level complaint rate by industry</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#555">n=50 accounts; wide Wilson 95% CIs due to small per-industry n (5-10)</text>
  <line x1="180" y1="420" x2="740" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="180" y1="100" x2="180" y2="420" stroke="#333" stroke-width="1.5"/>
  <!-- x axis: 0 - 100%, scale: x = 180 + rate * 5.6 -->
  <g font-size="11" fill="#555">
    <line x1="180" y1="420" x2="180" y2="425" stroke="#333"/>
    <line x1="320" y1="420" x2="320" y2="425" stroke="#333"/>
    <line x1="460" y1="420" x2="460" y2="425" stroke="#333"/>
    <line x1="600" y1="420" x2="600" y2="425" stroke="#333"/>
    <line x1="740" y1="420" x2="740" y2="425" stroke="#333"/>
    <text x="180" y="440" text-anchor="middle">0%</text>
    <text x="320" y="440" text-anchor="middle">25%</text>
    <text x="460" y="440" text-anchor="middle">50%</text>
    <text x="600" y="440" text-anchor="middle">75%</text>
    <text x="740" y="440" text-anchor="middle">100%</text>
    <text x="460" y="460" text-anchor="middle" font-size="12" fill="#333">% of accounts with >=1 complainer user</text>
  </g>
  <!-- rows, y 110..410, 7 rows, ~42px per row -->
  <!-- MarTech 87.5% CI [52.9, 97.8] -->
  <text x="175" y="128" text-anchor="end" font-size="12" font-weight="700">MarTech</text>
  <rect x="180" y="116" width="490" height="18" fill="#d62728" opacity="0.75"/>
  <line x1="476.2" y1="115" x2="476.2" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="727.8" y1="115" x2="727.8" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="476.2" y1="125" x2="727.8" y2="125" stroke="#333" stroke-width="1"/>
  <text x="680" y="128" font-size="11" fill="#222" font-weight="700">7/8 = 87.5%</text>
  <!-- eCommerce 70.0% CI [39.7, 89.2] -->
  <text x="175" y="168" text-anchor="end" font-size="12" font-weight="700">eCommerce</text>
  <rect x="180" y="156" width="392" height="18" fill="#ff7f0e" opacity="0.75"/>
  <line x1="402.3" y1="155" x2="402.3" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="679.5" y1="155" x2="679.5" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="402.3" y1="165" x2="679.5" y2="165" stroke="#333" stroke-width="1"/>
  <text x="582" y="168" font-size="11" fill="#222" font-weight="700">7/10 = 70.0%</text>
  <!-- CyberSecurity 66.7% -->
  <text x="175" y="208" text-anchor="end" font-size="12" font-weight="700">CyberSecurity</text>
  <rect x="180" y="196" width="373" height="18" fill="#ff7f0e" opacity="0.6"/>
  <text x="562" y="208" font-size="11" fill="#222" font-weight="700">4/6 = 66.7%</text>
  <!-- EdTech 60.0% -->
  <text x="175" y="248" text-anchor="end" font-size="12" font-weight="700">EdTech</text>
  <rect x="180" y="236" width="336" height="18" fill="#bcbd22" opacity="0.7"/>
  <text x="526" y="248" font-size="11" fill="#222" font-weight="700">3/5 = 60.0%</text>
  <!-- HealthTech 57.1% -->
  <text x="175" y="288" text-anchor="end" font-size="12" font-weight="700">HealthTech</text>
  <rect x="180" y="276" width="320" height="18" fill="#bcbd22" opacity="0.55"/>
  <text x="510" y="288" font-size="11" fill="#222" font-weight="700">4/7 = 57.1%</text>
  <!-- FinTech 33.3% -->
  <text x="175" y="328" text-anchor="end" font-size="12" font-weight="700">FinTech</text>
  <rect x="180" y="316" width="187" height="18" fill="#2ca02c" opacity="0.6"/>
  <text x="377" y="328" font-size="11" fill="#222" font-weight="700">2/6 = 33.3%</text>
  <!-- SaaS 25.0% CI [7.2, 59.1] -->
  <text x="175" y="368" text-anchor="end" font-size="12" font-weight="700">SaaS</text>
  <rect x="180" y="356" width="140" height="18" fill="#2ca02c" opacity="0.75"/>
  <line x1="220.3" y1="355" x2="220.3" y2="375" stroke="#333" stroke-width="2"/>
  <line x1="510.9" y1="355" x2="510.9" y2="375" stroke="#333" stroke-width="2"/>
  <line x1="220.3" y1="365" x2="510.9" y2="365" stroke="#333" stroke-width="1"/>
  <text x="330" y="368" font-size="11" fill="#222" font-weight="700">2/8 = 25.0%</text>
  <!-- overall line at 58% -->
  <line x1="504.8" y1="100" x2="504.8" y2="420" stroke="#888" stroke-dasharray="4,4"/>
  <text x="510" y="108" font-size="11" fill="#666">overall 58%</text>
  <text x="400" y="485" text-anchor="middle" font-size="11" fill="#666">CIs shown for MarTech/eCom/SaaS only to avoid clutter. All industry CIs overlap the overall rate.</text>
</svg>
