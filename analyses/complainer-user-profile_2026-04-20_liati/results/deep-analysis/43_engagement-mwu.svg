<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Pre-complaint engagement (30d): MWU z=-4.05</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#555">H2 direction reversed: complainers have LOWER ranked engagement (p&lt;0.0001)</text>
  <!-- axes -->
  <line x1="110" y1="400" x2="720" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="100" x2="110" y2="400" stroke="#333" stroke-width="1.5"/>
  <!-- y = events, 0-10 scale; y = 400 - v*30 -->
  <g font-size="11" fill="#555">
    <line x1="110" y1="400" x2="720" y2="400" stroke="#e6e6e6"/>
    <line x1="110" y1="370" x2="720" y2="370" stroke="#e6e6e6"/>
    <line x1="110" y1="340" x2="720" y2="340" stroke="#e6e6e6"/>
    <line x1="110" y1="310" x2="720" y2="310" stroke="#e6e6e6"/>
    <line x1="110" y1="280" x2="720" y2="280" stroke="#e6e6e6"/>
    <line x1="110" y1="250" x2="720" y2="250" stroke="#e6e6e6"/>
    <line x1="110" y1="220" x2="720" y2="220" stroke="#e6e6e6"/>
    <line x1="110" y1="190" x2="720" y2="190" stroke="#e6e6e6"/>
    <line x1="110" y1="160" x2="720" y2="160" stroke="#e6e6e6"/>
    <line x1="110" y1="130" x2="720" y2="130" stroke="#e6e6e6"/>
    <line x1="110" y1="100" x2="720" y2="100" stroke="#e6e6e6"/>
    <text x="100" y="404" text-anchor="end">0</text>
    <text x="100" y="344" text-anchor="end">2</text>
    <text x="100" y="284" text-anchor="end">4</text>
    <text x="100" y="224" text-anchor="end">6</text>
    <text x="100" y="164" text-anchor="end">8</text>
    <text x="100" y="104" text-anchor="end">10</text>
    <text x="60" y="250" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90 60 250)">events in 30d</text>
  </g>
  <!-- Complainer box: n=36, mean=2.25, median=0, Q1=0, Q3=4.25 -->
  <!-- x center = 240, width 80, so 200..280 -->
  <!-- box from Q1 to Q3, median line, whiskers -->
  <rect x="200" y="272.5" width="80" height="127.5" fill="#d62728" opacity="0.35" stroke="#d62728" stroke-width="1.5"/>
  <line x1="200" y1="400" x2="280" y2="400" stroke="#d62728" stroke-width="3"/>
  <text x="240" y="420" text-anchor="middle" font-size="12" font-weight="700">Complainer (n=36)</text>
  <text x="240" y="435" text-anchor="middle" font-size="11" fill="#555">median 0 | mean 2.25</text>
  <circle cx="240" cy="332.5" r="5" fill="#d62728" stroke="#fff" stroke-width="1.5"/>
  <text x="290" y="336" font-size="11" fill="#d62728">mean</text>
  <!-- heavy tail indicator -->
  <line x1="240" y1="272.5" x2="240" y2="175" stroke="#d62728" stroke-dasharray="2,2" stroke-width="1"/>
  <line x1="230" y1="175" x2="250" y2="175" stroke="#d62728" stroke-width="2"/>
  <text x="300" y="178" font-size="10" fill="#888">(max 7.5)</text>
  <!-- Non-complainer box: n=164, mean=1.98, median=1.5, Q1=1, Q3=3 -->
  <!-- x center = 500, width 80, so 460..540 -->
  <rect x="460" y="310" width="80" height="60" fill="#2ca02c" opacity="0.35" stroke="#2ca02c" stroke-width="1.5"/>
  <line x1="460" y1="355" x2="540" y2="355" stroke="#2ca02c" stroke-width="3"/>
  <text x="500" y="420" text-anchor="middle" font-size="12" font-weight="700">Non-complainer (n=164)</text>
  <text x="500" y="435" text-anchor="middle" font-size="11" fill="#555">median 1.5 | mean 1.98</text>
  <circle cx="500" cy="340.6" r="5" fill="#2ca02c" stroke="#fff" stroke-width="1.5"/>
  <line x1="500" y1="310" x2="500" y2="250" stroke="#2ca02c" stroke-dasharray="2,2" stroke-width="1"/>
  <line x1="490" y1="250" x2="510" y2="250" stroke="#2ca02c" stroke-width="2"/>
  <text x="545" y="253" font-size="10" fill="#888">Q3+1.5*IQR</text>
  <!-- Annotation -->
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#666">Rank-sum test: complainers lower rank despite similar mean (distribution bimodal - many zeros, few heavy users).</text>
</svg>
