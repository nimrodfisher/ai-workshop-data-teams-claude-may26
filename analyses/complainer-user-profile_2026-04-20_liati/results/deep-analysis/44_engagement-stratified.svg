<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Engagement signal holds within each plan stratum</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#555">Free: MWU z=-2.03 p=0.042 | Paid: MWU z=-3.57 p&lt;0.001</text>
  <!-- Paid panel (left) -->
  <text x="220" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#333">PAID stratum (n=150)</text>
  <line x1="110" y1="360" x2="360" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="110" y1="120" x2="110" y2="360" stroke="#333" stroke-width="1.2"/>
  <!-- scale 0-5: y = 360 - v*48 -->
  <g font-size="10" fill="#555">
    <line x1="110" y1="312" x2="360" y2="312" stroke="#eee"/>
    <line x1="110" y1="264" x2="360" y2="264" stroke="#eee"/>
    <line x1="110" y1="216" x2="360" y2="216" stroke="#eee"/>
    <line x1="110" y1="168" x2="360" y2="168" stroke="#eee"/>
    <line x1="110" y1="120" x2="360" y2="120" stroke="#eee"/>
    <text x="102" y="364" text-anchor="end">0</text>
    <text x="102" y="316" text-anchor="end">1</text>
    <text x="102" y="268" text-anchor="end">2</text>
    <text x="102" y="220" text-anchor="end">3</text>
    <text x="102" y="172" text-anchor="end">4</text>
    <text x="102" y="124" text-anchor="end">5</text>
  </g>
  <!-- Paid complainer (n=22): median 0, Q1 0, Q3 2.75, mean 1.55 -->
  <rect x="150" y="228" width="60" height="132" fill="#d62728" opacity="0.35" stroke="#d62728"/>
  <line x1="150" y1="360" x2="210" y2="360" stroke="#d62728" stroke-width="3"/>
  <circle cx="180" cy="285.6" r="4" fill="#d62728" stroke="#fff"/>
  <text x="180" y="380" text-anchor="middle" font-size="11">comp (n=22)</text>
  <text x="180" y="395" text-anchor="middle" font-size="10" fill="#666">med 0 / mean 1.55</text>
  <!-- Paid non-comp (n=128): median 1, Q1 1, Q3 3, mean 1.90 -->
  <rect x="260" y="216" width="60" height="96" fill="#2ca02c" opacity="0.35" stroke="#2ca02c"/>
  <line x1="260" y1="312" x2="320" y2="312" stroke="#2ca02c" stroke-width="3"/>
  <circle cx="290" cy="268.8" r="4" fill="#2ca02c" stroke="#fff"/>
  <text x="290" y="380" text-anchor="middle" font-size="11">non-comp (n=128)</text>
  <text x="290" y="395" text-anchor="middle" font-size="10" fill="#666">med 1 / mean 1.90</text>
  <!-- Free panel (right) -->
  <text x="590" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#333">FREE stratum (n=50)</text>
  <line x1="440" y1="360" x2="720" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="440" y1="120" x2="440" y2="360" stroke="#333" stroke-width="1.2"/>
  <g font-size="10" fill="#555">
    <line x1="440" y1="312" x2="720" y2="312" stroke="#eee"/>
    <line x1="440" y1="264" x2="720" y2="264" stroke="#eee"/>
    <line x1="440" y1="216" x2="720" y2="216" stroke="#eee"/>
    <line x1="440" y1="168" x2="720" y2="168" stroke="#eee"/>
    <line x1="440" y1="120" x2="720" y2="120" stroke="#eee"/>
    <text x="432" y="364" text-anchor="end">0</text>
    <text x="432" y="316" text-anchor="end">1</text>
    <text x="432" y="268" text-anchor="end">2</text>
    <text x="432" y="220" text-anchor="end">3</text>
    <text x="432" y="172" text-anchor="end">4</text>
    <text x="432" y="124" text-anchor="end">5</text>
  </g>
  <!-- Free complainer (n=14): median 0.5, Q1 0, Q3 5, mean 3.36 -->
  <rect x="490" y="120" width="60" height="240" fill="#d62728" opacity="0.35" stroke="#d62728"/>
  <line x1="490" y1="336" x2="550" y2="336" stroke="#d62728" stroke-width="3"/>
  <circle cx="520" cy="198.7" r="4" fill="#d62728" stroke="#fff"/>
  <text x="520" y="380" text-anchor="middle" font-size="11">comp (n=14)</text>
  <text x="520" y="395" text-anchor="middle" font-size="10" fill="#666">med 0.5 / mean 3.36</text>
  <!-- Free non-comp (n=36): median 2, Q1 1, Q3 3, mean 2.28 -->
  <rect x="610" y="216" width="60" height="96" fill="#2ca02c" opacity="0.35" stroke="#2ca02c"/>
  <line x1="610" y1="264" x2="670" y2="264" stroke="#2ca02c" stroke-width="3"/>
  <circle cx="640" cy="250.6" r="4" fill="#2ca02c" stroke="#fff"/>
  <text x="640" y="380" text-anchor="middle" font-size="11">non-comp (n=36)</text>
  <text x="640" y="395" text-anchor="middle" font-size="10" fill="#666">med 2 / mean 2.28</text>
  <!-- footnote -->
  <text x="400" y="432" text-anchor="middle" font-size="11" fill="#333">Free complainers show BIMODAL pattern: many zeros + few hyperactive (mean up, median down).</text>
  <text x="400" y="450" text-anchor="middle" font-size="11" fill="#333">Paid complainers show clean DISENGAGEMENT: every quantile is lower than non-complainers.</text>
  <text x="400" y="478" text-anchor="middle" font-size="10" fill="#666">Bar = IQR (Q1-Q3), heavy horizontal line = median, dot = mean. Event counts in 30 days before first complaint.</text>
</svg>
