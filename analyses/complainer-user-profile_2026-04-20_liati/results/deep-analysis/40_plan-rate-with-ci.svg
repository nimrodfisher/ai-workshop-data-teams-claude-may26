<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Free vs Paid: complaint rate with 95% CI</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#555">n=200 users; chi2=4.52 df=1 p=0.034; RR=1.91 [1.06, 3.44]</text>
  <!-- axes -->
  <line x1="110" y1="420" x2="720" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="100" x2="110" y2="420" stroke="#333" stroke-width="1.5"/>
  <!-- y gridlines: 0, 10, 20, 30, 40, 50 % -->
  <g font-size="11" fill="#555">
    <line x1="110" y1="420" x2="720" y2="420" stroke="#e6e6e6"/>
    <line x1="110" y1="356" x2="720" y2="356" stroke="#e6e6e6"/>
    <line x1="110" y1="292" x2="720" y2="292" stroke="#e6e6e6"/>
    <line x1="110" y1="228" x2="720" y2="228" stroke="#e6e6e6"/>
    <line x1="110" y1="164" x2="720" y2="164" stroke="#e6e6e6"/>
    <line x1="110" y1="100" x2="720" y2="100" stroke="#e6e6e6"/>
    <text x="100" y="424" text-anchor="end">0%</text>
    <text x="100" y="360" text-anchor="end">10%</text>
    <text x="100" y="296" text-anchor="end">20%</text>
    <text x="100" y="232" text-anchor="end">30%</text>
    <text x="100" y="168" text-anchor="end">40%</text>
    <text x="100" y="104" text-anchor="end">50%</text>
  </g>
  <!-- Free bar: rate 28.0%, Wilson CI [17.5, 41.6] -->
  <!-- scale: y = 420 - rate*6.4 (from 0 at y=420 to 50% at y=100, 320px / 50%) -->
  <rect x="200" y="240.8" width="140" height="179.2" fill="#d62728" opacity="0.8"/>
  <line x1="270" y1="153.76" x2="270" y2="307.6" stroke="#333" stroke-width="2"/>
  <line x1="255" y1="153.76" x2="285" y2="153.76" stroke="#333" stroke-width="2"/>
  <line x1="255" y1="307.6" x2="285" y2="307.6" stroke="#333" stroke-width="2"/>
  <text x="270" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#222">28.0%</text>
  <text x="270" y="440" text-anchor="middle" font-size="13" fill="#333">Free (n=50, 14 comp)</text>
  <!-- Paid bar: rate 14.67%, Wilson CI [9.9, 21.2] -->
  <rect x="460" y="326.1" width="140" height="93.9" fill="#2ca02c" opacity="0.8"/>
  <line x1="530" y1="284.32" x2="530" y2="356.3" stroke="#333" stroke-width="2"/>
  <line x1="515" y1="284.32" x2="545" y2="284.32" stroke="#333" stroke-width="2"/>
  <line x1="515" y1="356.3" x2="545" y2="356.3" stroke="#333" stroke-width="2"/>
  <text x="530" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#222">14.7%</text>
  <text x="530" y="440" text-anchor="middle" font-size="13" fill="#333">Paid (n=150, 22 comp)</text>
  <!-- overall baseline -->
  <line x1="110" y1="304.8" x2="720" y2="304.8" stroke="#888" stroke-dasharray="4,4"/>
  <text x="715" y="300" text-anchor="end" font-size="11" fill="#666">overall 18.0%</text>
  <!-- footnote -->
  <text x="400" y="478" text-anchor="middle" font-size="11" fill="#666">Error bars: 95% Wilson CI. Collapsing pro+ent into "paid" justified by near-identical rates (13.6% vs 15.4%).</text>
</svg>
