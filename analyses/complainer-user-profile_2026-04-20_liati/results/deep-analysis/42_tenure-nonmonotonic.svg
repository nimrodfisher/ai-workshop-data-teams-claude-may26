<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Complaint rate by tenure: non-monotonic</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#555">chi2=3.63 df=3 p=0.304; endpoint 2x2 (&lt;90d vs 270d+) chi2=2.88 p=0.090</text>
  <line x1="110" y1="420" x2="720" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="100" x2="110" y2="420" stroke="#333" stroke-width="1.5"/>
  <g font-size="11" fill="#555">
    <line x1="110" y1="420" x2="720" y2="420" stroke="#e6e6e6"/>
    <line x1="110" y1="356" x2="720" y2="356" stroke="#e6e6e6"/>
    <line x1="110" y1="292" x2="720" y2="292" stroke="#e6e6e6"/>
    <line x1="110" y1="228" x2="720" y2="228" stroke="#e6e6e6"/>
    <line x1="110" y1="164" x2="720" y2="164" stroke="#e6e6e6"/>
    <line x1="110" y1="100" x2="720" y2="100" stroke="#e6e6e6"/>
    <text x="100" y="424" text-anchor="end">0%</text>
    <text x="100" y="360" text-anchor="end">10%</text>
    <text x="100" y="296" text-anchor="end">20%</text>
    <text x="100" y="232" text-anchor="end">30%</text>
    <text x="100" y="168" text-anchor="end">40%</text>
    <text x="100" y="104" text-anchor="end">50%</text>
  </g>
  <!-- scale: y = 420 - rate*6.4 -->
  <!-- lt90d: 23.73% -->
  <rect x="160" y="268.1" width="110" height="151.9" fill="#1f77b4" opacity="0.8"/>
  <text x="215" y="258" text-anchor="middle" font-size="13" font-weight="700">23.7%</text>
  <text x="215" y="440" text-anchor="middle" font-size="12">&lt;90d (n=59)</text>
  <text x="215" y="456" text-anchor="middle" font-size="11" fill="#666">14/59</text>
  <!-- 90-180d: 15.25% -->
  <rect x="300" y="322.4" width="110" height="97.6" fill="#1f77b4" opacity="0.55"/>
  <text x="355" y="312" text-anchor="middle" font-size="13" font-weight="700">15.3%</text>
  <text x="355" y="440" text-anchor="middle" font-size="12">90-180d (n=59)</text>
  <text x="355" y="456" text-anchor="middle" font-size="11" fill="#666">9/59</text>
  <!-- 180-270d: 22.22% -->
  <rect x="440" y="277.8" width="110" height="142.2" fill="#1f77b4" opacity="0.7"/>
  <text x="495" y="268" text-anchor="middle" font-size="13" font-weight="700">22.2%</text>
  <text x="495" y="440" text-anchor="middle" font-size="12">180-270d (n=36)</text>
  <text x="495" y="456" text-anchor="middle" font-size="11" fill="#666">8/36</text>
  <!-- 270d+: 10.87% -->
  <rect x="580" y="350.4" width="110" height="69.6" fill="#1f77b4" opacity="0.4"/>
  <text x="635" y="340" text-anchor="middle" font-size="13" font-weight="700">10.9%</text>
  <text x="635" y="440" text-anchor="middle" font-size="12">270d+ (n=46)</text>
  <text x="635" y="456" text-anchor="middle" font-size="11" fill="#666">5/46</text>
  <line x1="110" y1="304.8" x2="720" y2="304.8" stroke="#888" stroke-dasharray="4,4"/>
  <text x="715" y="300" text-anchor="end" font-size="11" fill="#666">overall 18.0%</text>
  <text x="400" y="478" text-anchor="middle" font-size="11" fill="#666">Pattern is non-monotonic: no evidence of steady tenure effect. Newest cohort elevated; oldest suppressed.</text>
</svg>
