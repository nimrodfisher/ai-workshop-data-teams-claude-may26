<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: end; }
    .xlabel { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: middle; }
    .val { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #fff; text-anchor: middle; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    .bug { fill: #8e44ad; }
    .billing { fill: #f39c12; }
    .legend-text { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #333; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Complaint category mix by plan</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">Pro is bug-dominant; Free and Enterprise are ~50/50 billing vs bug</text>
  <line x1="90" y1="70" x2="90" y2="410" class="ax"/>
  <line x1="90" y1="410" x2="710" y2="410" class="ax"/>
  <line x1="90" y1="350" x2="710" y2="350" class="grid"/>
  <line x1="90" y1="290" x2="710" y2="290" class="grid"/>
  <line x1="90" y1="230" x2="710" y2="230" class="grid"/>
  <line x1="90" y1="170" x2="710" y2="170" class="grid"/>
  <line x1="90" y1="110" x2="710" y2="110" class="grid"/>
  <text x="82" y="414" class="ylabel">0</text>
  <text x="82" y="354" class="ylabel">3</text>
  <text x="82" y="294" class="ylabel">6</text>
  <text x="82" y="234" class="ylabel">9</text>
  <text x="82" y="174" class="ylabel">12</text>
  <text x="82" y="114" class="ylabel">15</text>
  <text x="40" y="245" class="xlabel" transform="rotate(-90 40 245)">tickets</text>
  <rect x="185" y="250" width="80" height="160" class="billing"/>
  <rect x="185" y="130" width="80" height="120" class="bug"/>
  <text x="225" y="340" class="val">8 billing</text>
  <text x="225" y="200" class="val">6 bug</text>
  <rect x="360" y="250" width="80" height="160" class="billing"/>
  <rect x="360" y="90" width="80" height="160" class="bug"/>
  <text x="400" y="340" class="val">8 billing</text>
  <text x="400" y="180" class="val">8 bug</text>
  <rect x="535" y="390" width="80" height="20" class="billing"/>
  <rect x="535" y="230" width="80" height="160" class="bug"/>
  <text x="575" y="405" class="val">1 bill</text>
  <text x="575" y="320" class="val">8 bug</text>
  <text x="225" y="430" class="xlabel">free</text>
  <text x="400" y="430" class="xlabel">enterprise</text>
  <text x="575" y="430" class="xlabel">pro</text>
  <text x="225" y="447" class="note">billing-heavy (57%)</text>
  <text x="400" y="447" class="note">even split (50%)</text>
  <text x="575" y="447" class="note">bug-dominant (89%)</text>
  <rect x="280" y="470" width="14" height="14" class="billing"/>
  <text x="300" y="482" class="legend-text">billing</text>
  <rect x="380" y="470" width="14" height="14" class="bug"/>
  <text x="400" y="482" class="legend-text">bug</text>
</svg>
