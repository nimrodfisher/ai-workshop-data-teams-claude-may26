<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: end; }
    .xlabel { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: middle; }
    .val { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #111; text-anchor: middle; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    .baseline { stroke: #c0392b; stroke-width: 1.5; stroke-dasharray: 6,4; }
    .bar-signal { fill: #e67e22; }
    .bar-neutral { fill: #3498db; }
    .bar-below { fill: #95a5a6; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Complaint rate by tenure at 2025-06-17</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">Newest users complain most; oldest complain least</text>
  <line x1="90" y1="70" x2="90" y2="410" class="ax"/>
  <line x1="90" y1="410" x2="710" y2="410" class="ax"/>
  <line x1="90" y1="313" x2="710" y2="313" class="grid"/>
  <line x1="90" y1="216" x2="710" y2="216" class="grid"/>
  <line x1="90" y1="119" x2="710" y2="119" class="grid"/>
  <text x="82" y="414" class="ylabel">0%</text>
  <text x="82" y="317" class="ylabel">10%</text>
  <text x="82" y="220" class="ylabel">20%</text>
  <text x="82" y="123" class="ylabel">30%</text>
  <line x1="90" y1="235" x2="710" y2="235" class="baseline"/>
  <text x="705" y="230" class="note" text-anchor="end">baseline 18.0%</text>
  <rect x="160" y="180" width="70" height="230" class="bar-signal"/>
  <rect x="295" y="262" width="70" height="148" class="bar-neutral"/>
  <rect x="430" y="194" width="70" height="216" class="bar-neutral"/>
  <rect x="565" y="305" width="70" height="105" class="bar-below"/>
  <text x="195" y="174" class="val">23.7%</text>
  <text x="330" y="256" class="val">15.3%</text>
  <text x="465" y="188" class="val">22.2%</text>
  <text x="600" y="299" class="val">10.9%</text>
  <text x="195" y="430" class="xlabel">&lt;90d</text>
  <text x="330" y="430" class="xlabel">90-180d</text>
  <text x="465" y="430" class="xlabel">180-270d</text>
  <text x="600" y="430" class="xlabel">270d+</text>
  <text x="195" y="447" class="note">n=59, 14 compl</text>
  <text x="330" y="447" class="note">n=59, 9 compl</text>
  <text x="465" y="447" class="note">n=36, 8 compl</text>
  <text x="600" y="447" class="note">n=46, 5 compl</text>
  <text x="195" y="467" class="val">1.32&#215;</text>
  <text x="330" y="467" class="val">0.85&#215;</text>
  <text x="465" y="467" class="val">1.23&#215;</text>
  <text x="600" y="467" class="val">0.60&#215;</text>
  <text x="400" y="485" class="note">lift vs baseline (tenure bucket)</text>
</svg>
