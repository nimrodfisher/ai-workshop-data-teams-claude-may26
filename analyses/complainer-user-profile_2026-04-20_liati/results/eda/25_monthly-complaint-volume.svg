<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: end; }
    .xlabel { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: middle; }
    .val { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #111; text-anchor: middle; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    .bar-comp { fill: #e67e22; }
    .bar-all { fill: #bdc3c7; }
    .legend-text { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #333; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Monthly ticket volume: complaints vs all tickets</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">May 2025 spike visible in the total (21 tickets) - same as prior account-level analysis</text>
  <line x1="90" y1="70" x2="90" y2="410" class="ax"/>
  <line x1="90" y1="410" x2="710" y2="410" class="ax"/>
  <line x1="90" y1="335" x2="710" y2="335" class="grid"/>
  <line x1="90" y1="260" x2="710" y2="260" class="grid"/>
  <line x1="90" y1="185" x2="710" y2="185" class="grid"/>
  <line x1="90" y1="110" x2="710" y2="110" class="grid"/>
  <text x="82" y="414" class="ylabel">0</text>
  <text x="82" y="339" class="ylabel">6</text>
  <text x="82" y="264" class="ylabel">12</text>
  <text x="82" y="189" class="ylabel">18</text>
  <text x="82" y="114" class="ylabel">24</text>
  <text x="40" y="245" class="xlabel" transform="rotate(-90 40 245)">tickets</text>
  <rect x="115" y="285" width="25" height="125" class="bar-all"/>
  <rect x="145" y="323" width="25" height="87" class="bar-comp"/>
  <rect x="205" y="297" width="25" height="113" class="bar-all"/>
  <rect x="235" y="335" width="25" height="75" class="bar-comp"/>
  <rect x="295" y="235" width="25" height="175" class="bar-all"/>
  <rect x="325" y="348" width="25" height="62" class="bar-comp"/>
  <rect x="385" y="297" width="25" height="113" class="bar-all"/>
  <rect x="415" y="360" width="25" height="50" class="bar-comp"/>
  <rect x="475" y="260" width="25" height="150" class="bar-all"/>
  <rect x="505" y="335" width="25" height="75" class="bar-comp"/>
  <rect x="565" y="148" width="25" height="262" class="bar-all"/>
  <rect x="595" y="298" width="25" height="112" class="bar-comp"/>
  <rect x="655" y="360" width="25" height="50" class="bar-all"/>
  <rect x="685" y="385" width="25" height="25" class="bar-comp"/>
  <text x="140" y="280" class="val">10</text>
  <text x="230" y="292" class="val">9</text>
  <text x="320" y="230" class="val">14</text>
  <text x="410" y="292" class="val">9</text>
  <text x="500" y="255" class="val">12</text>
  <text x="590" y="143" class="val">21</text>
  <text x="680" y="355" class="val">4</text>
  <text x="142" y="430" class="xlabel">Dec'24</text>
  <text x="232" y="430" class="xlabel">Jan'25</text>
  <text x="322" y="430" class="xlabel">Feb'25</text>
  <text x="412" y="430" class="xlabel">Mar'25</text>
  <text x="502" y="430" class="xlabel">Apr'25</text>
  <text x="592" y="430" class="xlabel">May'25</text>
  <text x="682" y="430" class="xlabel">Jun'25</text>
  <text x="682" y="445" class="note">(partial)</text>
  <rect x="250" y="470" width="14" height="14" class="bar-all"/>
  <text x="270" y="482" class="legend-text">all tickets</text>
  <rect x="380" y="470" width="14" height="14" class="bar-comp"/>
  <text x="400" y="482" class="legend-text">complaints (bug + billing)</text>
</svg>
