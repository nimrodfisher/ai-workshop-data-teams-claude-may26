<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: end; }
    .xlabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: middle; }
    .val { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #111; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; }
    .baseline { stroke: #c0392b; stroke-width: 1.5; stroke-dasharray: 6,4; }
    .bar-signal { fill: #e67e22; }
    .bar-neutral { fill: #3498db; }
    .bar-below { fill: #95a5a6; }
    .bar-weak { fill: #dcdcdc; stroke: #999; stroke-dasharray: 3,3; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Complaint rate by industry (secondary)</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">eCommerce/MarTech 4&#215; the rate of SaaS/FinTech &#x2014; several n&lt;30 cells marked light</text>
  <line x1="190" y1="70" x2="190" y2="410" class="ax"/>
  <line x1="190" y1="410" x2="720" y2="410" class="ax"/>
  <line x1="190" y1="410" x2="720" y2="410" class="grid"/>
  <line x1="296" y1="70" x2="296" y2="410" class="grid"/>
  <line x1="402" y1="70" x2="402" y2="410" class="grid"/>
  <line x1="508" y1="70" x2="508" y2="410" class="grid"/>
  <line x1="614" y1="70" x2="614" y2="410" class="grid"/>
  <line x1="720" y1="70" x2="720" y2="410" class="grid"/>
  <text x="190" y="427" class="xlabel">0%</text>
  <text x="296" y="427" class="xlabel">10%</text>
  <text x="402" y="427" class="xlabel">20%</text>
  <text x="508" y="427" class="xlabel">30%</text>
  <text x="614" y="427" class="xlabel">40%</text>
  <text x="720" y="427" class="xlabel">50%</text>
  <line x1="380.8" y1="70" x2="380.8" y2="410" class="baseline"/>
  <text x="380.8" y="63" class="xlabel" style="fill:#c0392b">baseline 18%</text>
  <text x="183" y="92" class="ylabel">eCommerce</text>
  <rect x="190" y="78" width="329" height="28" class="bar-signal"/>
  <text x="525" y="98" class="val">31.0%  (1.72&#215;, n=29)</text>
  <text x="183" y="132" class="ylabel">MarTech</text>
  <rect x="190" y="118" width="292" height="28" class="bar-signal"/>
  <text x="488" y="138" class="val">27.6%  (1.53&#215;, n=29)</text>
  <text x="183" y="172" class="ylabel">CyberSecurity</text>
  <rect x="190" y="158" width="249" height="28" class="bar-weak"/>
  <text x="445" y="178" class="val">23.5%  (1.31&#215;, n=17 - small)</text>
  <text x="183" y="212" class="ylabel">EdTech</text>
  <rect x="190" y="198" width="230" height="28" class="bar-weak"/>
  <text x="426" y="218" class="val">21.7%  (1.21&#215;, n=23 - small)</text>
  <text x="183" y="252" class="ylabel">HealthTech</text>
  <rect x="190" y="238" width="189" height="28" class="bar-neutral"/>
  <text x="385" y="258" class="val">17.9%  (0.99&#215;, n=28 - small)</text>
  <text x="183" y="292" class="ylabel">FinTech</text>
  <rect x="190" y="278" width="76" height="28" class="bar-weak"/>
  <text x="272" y="298" class="val">7.1%  (0.40&#215;, n=28 - small)</text>
  <text x="183" y="332" class="ylabel">SaaS</text>
  <rect x="190" y="318" width="69" height="28" class="bar-below"/>
  <text x="265" y="338" class="val">6.5%  (0.36&#215;, n=46)</text>
  <text x="400" y="465" class="note" text-anchor="middle">Legend: solid = n&#x2265;30 &amp; lift&#x2265;1.3&#215;; striped = n&lt;30 (Suggestive only)</text>
</svg>
