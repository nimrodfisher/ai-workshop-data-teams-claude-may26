<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: end; }
    .xlabel { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: middle; }
    .val { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #111; text-anchor: middle; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    .baseline { stroke: #c0392b; stroke-width: 1.5; stroke-dasharray: 6,4; }
    .bar-neutral { fill: #3498db; }
    .bar-below { fill: #95a5a6; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Complaint rate by role (near-flat: no signal)</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">Max lift 1.16&#215; &#x2014; below the 1.3&#215; confirm threshold</text>
  <line x1="90" y1="70" x2="90" y2="410" class="ax"/>
  <line x1="90" y1="410" x2="710" y2="410" class="ax"/>
  <line x1="90" y1="313" x2="710" y2="313" class="grid"/>
  <line x1="90" y1="216" x2="710" y2="216" class="grid"/>
  <line x1="90" y1="119" x2="710" y2="119" class="grid"/>
  <text x="82" y="414" class="ylabel">0%</text>
  <text x="82" y="317" class="ylabel">10%</text>
  <text x="82" y="220" class="ylabel">20%</text>
  <text x="82" y="123" class="ylabel">30%</text>
  <line x1="90" y1="235" x2="710" y2="235" class="baseline"/>
  <text x="705" y="230" class="note" text-anchor="end">baseline 18.0%</text>
  <rect x="185" y="208" width="80" height="202" class="bar-neutral"/>
  <rect x="360" y="251" width="80" height="159" class="bar-neutral"/>
  <rect x="535" y="251" width="80" height="159" class="bar-below"/>
  <text x="225" y="202" class="val">20.8%</text>
  <text x="400" y="245" class="val">16.4%</text>
  <text x="575" y="245" class="val">16.4%</text>
  <text x="225" y="430" class="xlabel">admin</text>
  <text x="400" y="430" class="xlabel">viewer</text>
  <text x="575" y="430" class="xlabel">analyst</text>
  <text x="225" y="447" class="note">n=72, 15 complainers</text>
  <text x="400" y="447" class="note">n=67, 11 complainers</text>
  <text x="575" y="447" class="note">n=61, 10 complainers</text>
  <text x="225" y="467" class="val">1.16&#215;</text>
  <text x="400" y="467" class="val">0.91&#215;</text>
  <text x="575" y="467" class="val">0.91&#215;</text>
  <text x="400" y="485" class="note">lift vs baseline</text>
</svg>
