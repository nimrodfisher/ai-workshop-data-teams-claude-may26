<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: end; }
    .xlabel { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: middle; }
    .val { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #111; text-anchor: middle; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    .bar { fill: #2980b9; }
    .median { stroke: #c0392b; stroke-width: 2; stroke-dasharray: 5,4; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Events-per-user distribution (200 users)</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">Right-skewed: median 8, mean 9.8, IQR 5-11, max 49</text>
  <line x1="90" y1="70" x2="90" y2="410" class="ax"/>
  <line x1="90" y1="410" x2="710" y2="410" class="ax"/>
  <line x1="90" y1="332" x2="710" y2="332" class="grid"/>
  <line x1="90" y1="255" x2="710" y2="255" class="grid"/>
  <line x1="90" y1="178" x2="710" y2="178" class="grid"/>
  <line x1="90" y1="100" x2="710" y2="100" class="grid"/>
  <text x="82" y="414" class="ylabel">0</text>
  <text x="82" y="336" class="ylabel">25</text>
  <text x="82" y="259" class="ylabel">50</text>
  <text x="82" y="182" class="ylabel">75</text>
  <text x="82" y="104" class="ylabel">100</text>
  <text x="40" y="245" class="xlabel" transform="rotate(-90 40 245)">users</text>
  <rect x="130" y="367" width="60" height="43" class="bar"/>
  <rect x="210" y="290" width="60" height="120" class="bar"/>
  <rect x="290" y="152" width="60" height="258" class="bar"/>
  <rect x="370" y="297" width="60" height="113" class="bar"/>
  <rect x="450" y="367" width="60" height="43" class="bar"/>
  <rect x="530" y="395" width="60" height="15" class="bar"/>
  <rect x="610" y="388" width="60" height="22" class="bar"/>
  <text x="160" y="362" class="val">14</text>
  <text x="240" y="285" class="val">39</text>
  <text x="320" y="147" class="val">84</text>
  <text x="400" y="292" class="val">37</text>
  <text x="480" y="362" class="val">14</text>
  <text x="560" y="390" class="val">5</text>
  <text x="640" y="383" class="val">7</text>
  <text x="160" y="430" class="xlabel">1-2</text>
  <text x="240" y="430" class="xlabel">3-5</text>
  <text x="320" y="430" class="xlabel">6-10</text>
  <text x="400" y="430" class="xlabel">11-15</text>
  <text x="480" y="430" class="xlabel">16-20</text>
  <text x="560" y="430" class="xlabel">21-30</text>
  <text x="640" y="430" class="xlabel">31+</text>
  <text x="400" y="450" class="note">events per user (bucketed)</text>
  <line x1="320" y1="70" x2="320" y2="410" class="median"/>
  <text x="400" y="482" class="note">red dashed line: median = 8 events/user</text>
</svg>
