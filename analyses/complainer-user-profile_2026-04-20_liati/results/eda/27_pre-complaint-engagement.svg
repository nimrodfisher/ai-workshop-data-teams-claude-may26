<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" width="100%">
  <style>
    .title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .subtitle { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    .ax { stroke: #888; stroke-width: 1; fill: none; }
    .grid { stroke: #ddd; stroke-width: 1; stroke-dasharray: 2,3; }
    .ylabel { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #444; text-anchor: end; }
    .xlabel { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #222; text-anchor: middle; }
    .val { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #111; text-anchor: middle; }
    .note { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    .caveat { font: 600 11px 'Segoe UI', Arial, sans-serif; fill: #c0392b; text-anchor: middle; }
    .box-c { fill: #e67e22; stroke: #a04804; stroke-width: 1; }
    .box-nc { fill: #3498db; stroke: #1b5580; stroke-width: 1; }
    .median-line { stroke: #1a1a1a; stroke-width: 2; }
  </style>
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="28" class="title" text-anchor="middle">Pre-complaint 30-day events: complainer vs non</text>
  <text x="400" y="48" class="subtitle" text-anchor="middle">Complainers' median (5) is 1.67&#215; non-complainers' (3)</text>
  <line x1="90" y1="70" x2="90" y2="410" class="ax"/>
  <line x1="90" y1="410" x2="710" y2="410" class="ax"/>
  <line x1="90" y1="342" x2="710" y2="342" class="grid"/>
  <line x1="90" y1="274" x2="710" y2="274" class="grid"/>
  <line x1="90" y1="206" x2="710" y2="206" class="grid"/>
  <line x1="90" y1="138" x2="710" y2="138" class="grid"/>
  <text x="82" y="414" class="ylabel">0</text>
  <text x="82" y="346" class="ylabel">2</text>
  <text x="82" y="278" class="ylabel">4</text>
  <text x="82" y="210" class="ylabel">6</text>
  <text x="82" y="142" class="ylabel">8</text>
  <text x="40" y="245" class="xlabel" transform="rotate(-90 40 245)">events (30 days)</text>
  <rect x="225" y="214" width="150" height="120" class="box-c"/>
  <line x1="225" y1="240" x2="375" y2="240" class="median-line"/>
  <text x="300" y="232" class="val">median 5</text>
  <text x="300" y="350" class="note">p25=2.25  p75=5.75</text>
  <text x="300" y="205" class="val">mean 4.86</text>
  <rect x="445" y="308" width="150" height="68" class="box-nc"/>
  <line x1="445" y1="342" x2="595" y2="342" class="median-line"/>
  <text x="520" y="336" class="val">median 3</text>
  <text x="520" y="392" class="note">p25=1  p75=4</text>
  <text x="520" y="300" class="val">mean 3.11</text>
  <text x="300" y="430" class="xlabel">complainers (pre-complaint 30d)</text>
  <text x="520" y="430" class="xlabel">non-complainers (matched 30d)</text>
  <text x="300" y="448" class="note">n=14 (only 14 of 36 complainers have full coverage)</text>
  <text x="520" y="448" class="note">n=164 (all non-complainers in matched window)</text>
  <text x="400" y="475" class="caveat">Signal direction right, but n=14 complainers is below n&#x2265;30 &#x2192; mark Suggestive, not Confirmed</text>
  <text x="400" y="490" class="note">events coverage starts 2025-03-07, so only complaints opened &#x2265; 2025-04-06 get full lookback</text>
</svg>
