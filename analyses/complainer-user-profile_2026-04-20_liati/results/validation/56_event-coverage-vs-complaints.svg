  </g>

  <text x="80" y="275" class="lbl" fill="#c9495a">� 18 complainers (red): first complaint BEFORE event coverage � pre-complaint event window is structurally empty, not behavioral.</text>
  <text x="80" y="292" class="lbl" fill="#2a4b7c">� 18 complainers (blue): first complaint inside event coverage � some have full 30d pre-window, others partial.</text>
  <text x="80" y="314" class="note">Implication: "disengagement" finding in Phase 4 was driven by these structural zeros, not by behavior. Corrected analysis (n=14 with valid coverage) actually shows complainers MORE engaged (median 5 vs 2, z=+2.27).</text>
</svg>
