<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="320" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" preserveAspectRatio="xMidYMid meet" font-family="sans-serif" font-size="12">
  <title>Weekly Event Count  FinTech Pro</title>
  <!-- Background -->
  <rect width="700" height="320" fill="#f9fafb" rx="6"/>
  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Weekly Event Count  FinTech Pro</text>
  <text x="350" y="42" text-anchor="middle" font-size="11" fill="#666">Apr 7  Jun 6, 2025 &#xB7; Shaded = Last 30 days (May 7Jun 6)</text>

  <!-- Axes -->
  <!-- Y axis: max=10, plot area: x=70..650, y=60..260 (h=200) -->
  <!-- Grid lines at y=2,4,6,8,10 -->
  <line x1="70" y1="260" x2="650" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="70" y1="220" x2="650" y2="220" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="180" x2="650" y2="180" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="140" x2="650" y2="140" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="100" x2="650" y2="100" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="60"  x2="650" y2="60"  stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="60" x2="70" y2="260" stroke="#ccc" stroke-width="1"/>

  <!-- Y axis labels (0,2,4,6,8,10) -->
  <text x="62" y="264" text-anchor="end" fill="#555" font-size="11">0</text>
  <text x="62" y="224" text-anchor="end" fill="#555" font-size="11">2</text>
  <text x="62" y="184" text-anchor="end" fill="#555" font-size="11">4</text>
  <text x="62" y="144" text-anchor="end" fill="#555" font-size="11">6</text>
  <text x="62" y="104" text-anchor="end" fill="#555" font-size="11">8</text>
  <text x="62" y="64"  text-anchor="end" fill="#555" font-size="11">10</text>
  <text x="16" y="170" text-anchor="middle" fill="#555" font-size="11" transform="rotate(-90,16,170)">Events / week</text>

  <!-- Last-30-days shading: x from week May-5 start to end -->
  <!-- 9 weeks, each 64px wide. x positions: 70 + i*64 + 32 (center) -->
  <!-- weeks: 0=Apr7, 1=Apr14, 2=Apr21, 3=Apr28, 4=May5, 5=May12, 6=May19, 7=May26, 8=Jun2 -->
  <!-- May 7 falls inside week 4 (May5). Shade from start of week 5 (May12): x=70+5*64=390 to 650 -->
  <rect x="390" y="60" width="260" height="200" fill="#dbeafe" opacity="0.5"/>
  <text x="520" y="75" text-anchor="middle" font-size="10" fill="#3b82f6">Last 30 days</text>

  <!-- Bars (event_count)  bar width = 40, centered at x = 70 + i*64 + 32 -->
  <!-- scale: 1 unit = 20px, y = 260 - val*20 -->
  <!-- i=0: 8 → y=100, h=160 -->
  <rect x="82"  y="100" width="40" height="160" fill="#6366f1" opacity="0.85" rx="2"/>
  <!-- i=1: 10 → y=60, h=200 -->
  <rect x="146" y="60"  width="40" height="200" fill="#6366f1" opacity="0.85" rx="2"/>
  <!-- i=2: 9 → y=80, h=180 -->
  <rect x="210" y="80"  width="40" height="180" fill="#6366f1" opacity="0.85" rx="2"/>
  <!-- i=3: 8 → y=100, h=160 -->
  <rect x="274" y="100" width="40" height="160" fill="#6366f1" opacity="0.85" rx="2"/>
  <!-- i=4: 6 → y=140, h=120 (straddles period boundary) -->
  <rect x="338" y="140" width="40" height="120" fill="#6366f1" opacity="0.85" rx="2"/>
  <!-- i=5: 6 → y=140, h=120 -->
  <rect x="402" y="140" width="40" height="120" fill="#3b82f6" opacity="0.85" rx="2"/>
  <!-- i=6: 9 → y=80, h=180 -->
  <rect x="466" y="80"  width="40" height="180" fill="#3b82f6" opacity="0.85" rx="2"/>
  <!-- i=7: 4 → y=180, h=80 -->
  <rect x="530" y="180" width="40" height="80"  fill="#3b82f6" opacity="0.85" rx="2"/>
  <!-- i=8: 3 → y=200, h=60 -->
  <rect x="594" y="200" width="40" height="60"  fill="#3b82f6" opacity="0.85" rx="2"/>

  <!-- Value labels on bars -->
  <text x="102"  y="96"  text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">8</text>
  <text x="166"  y="56"  text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">10</text>
  <text x="230"  y="76"  text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">9</text>
  <text x="294"  y="96"  text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">8</text>
  <text x="358"  y="136" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
  <text x="422"  y="136" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
  <text x="486"  y="76"  text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">9</text>
  <text x="550"  y="176" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <text x="614"  y="196" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>

  <!-- X axis labels -->
  <text x="102"  y="278" text-anchor="middle" fill="#555" font-size="10">Apr 7</text>
  <text x="166"  y="278" text-anchor="middle" fill="#555" font-size="10">Apr 14</text>
  <text x="230"  y="278" text-anchor="middle" fill="#555" font-size="10">Apr 21</text>
  <text x="294"  y="278" text-anchor="middle" fill="#555" font-size="10">Apr 28</text>
  <text x="358"  y="278" text-anchor="middle" fill="#555" font-size="10">May 5</text>
  <text x="422"  y="278" text-anchor="middle" fill="#555" font-size="10">May 12</text>
  <text x="486"  y="278" text-anchor="middle" fill="#555" font-size="10">May 19</text>
  <text x="550"  y="278" text-anchor="middle" fill="#555" font-size="10">May 26</text>
  <text x="614"  y="278" text-anchor="middle" fill="#555" font-size="10">Jun 2</text>

  <!-- Legend -->
  <rect x="70" y="296" width="14" height="10" fill="#6366f1" opacity="0.85" rx="2"/>
  <text x="88" y="306" fill="#555" font-size="11">Prior 30 days</text>
  <rect x="190" y="296" width="14" height="10" fill="#3b82f6" opacity="0.85" rx="2"/>
  <text x="208" y="306" fill="#555" font-size="11">Last 30 days</text>
</svg>
