  <rect x="50" y="230" width="610" height="26" fill="#f9fafb"/>
  <text x="60"  y="247" fill="#374151" font-size="12">Quinn Zimmerman</text>
  <text x="170" y="247" fill="#6b7280" font-size="11" font-style="italic">analyst</text>
