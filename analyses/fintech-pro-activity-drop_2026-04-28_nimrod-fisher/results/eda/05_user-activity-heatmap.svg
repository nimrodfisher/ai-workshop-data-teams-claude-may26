  <text x="420" y="169" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">6</text>
  <text x="530" y="169" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">&#x25B2; +3 (+100%)</text>

  <!-- Divider -->
  <line x1="50" y1="180" x2="660" y2="180" stroke="#d1d5db" stroke-width="1"/>

  <!-- Account header: ZGarcia Corp -->
  <rect x="50" y="182" width="610" height="20" fill="#dbeafe" rx="3"/>
  <text x="60" y="196" font-size="12" font-weight="bold" fill="#1d4ed8">ZGarcia Corp</text>

