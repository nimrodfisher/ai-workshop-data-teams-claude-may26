  <rect x="50" y="256" width="610" height="26" fill="white"/>
  <text x="60"  y="273" fill="#374151" font-size="12">Walt Lopez</text>
  <text x="170" y="273" fill="#6b7280" font-size="11" font-style="italic">analyst</text>
  <text x="300" y="273" text-anchor="middle" fill="#374151" font-size="13" font-weight="bold">3</text>
  <text x="420" y="273" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">1</text>
  <text x="530" y="273" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">&#x25BC; 2 (67%)</text>

