<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" preserveAspectRatio="xMidYMid meet" font-family="sans-serif" font-size="12">
  <title>User Activity: Prior 30 vs Last 30 by Role</title>
  <rect width="700" height="340" fill="#f9fafb" rx="6"/>
  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">User Activity: Prior 30 vs Last 30 by Role</text>
  <text x="350" y="42" text-anchor="middle" font-size="11" fill="#666">FinTech Pro accounts &#xB7; arrow = change &#xB7; red = dropped, green = grew</text>

  <!-- Column headers -->
  <text x="300" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Prior 30</text>
  <text x="420" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Last 30</text>
  <text x="530" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Change</text>

  <!-- Divider line after headers -->
  <line x1="50" y1="68" x2="660" y2="68" stroke="#d1d5db" stroke-width="1"/>

  <!-- Account header: PJohnson Corp -->
  <rect x="50" y="72" width="610" height="20" fill="#ede9fe" rx="3"/>
  <text x="60" y="86" font-size="12" font-weight="bold" fill="#4f46e5">PJohnson Corp</text>

  <!-- Row 1: Olivia Garcia (analyst) -->
  <rect x="50" y="94" width="610" height="28" fill="white"/>
  <text x="60"  y="113" fill="#374151" font-size="12">Olivia Garcia</text>
  <text x="170" y="113" fill="#6b7280" font-size="11" font-style="italic">analyst</text>
  <text x="300" y="113" text-anchor="middle" fill="#374151" font-size="13" font-weight="bold">13</text>
  <text x="420" y="113" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">7</text>
  <text x="530" y="113" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">&#x25BC; 6 (46%)</text>

  <!-- Row 2: Karen Young (admin) -->
  <rect x="50" y="122" width="610" height="28" fill="#f9fafb"/>
  <text x="60"  y="141" fill="#374151" font-size="12">Karen Young</text>
  <text x="170" y="141" fill="#6b7280" font-size="11" font-style="italic">admin</text>
  <text x="300" y="141" text-anchor="middle" fill="#374151" font-size="13" font-weight="bold">6</text>
  <text x="420" y="141" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">5</text>
  <text x="530" y="141" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">&#x25BC; 1 (17%)</text>

