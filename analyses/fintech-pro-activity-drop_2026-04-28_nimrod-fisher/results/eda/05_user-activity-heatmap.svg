  <rect x="50" y="308" width="610" height="26" fill="white"/>
  <text x="60"  y="325" fill="#374151" font-size="12">Walt Harris</text>
  <text x="170" y="325" fill="#6b7280" font-size="11" font-style="italic">viewer</text>
