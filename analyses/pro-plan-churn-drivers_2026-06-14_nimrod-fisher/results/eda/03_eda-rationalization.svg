<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" preserveAspectRatio="xMidYMid meet" font-family="'IBM Plex Mono', monospace">
  <rect width="720" height="380" fill="#f4efe6"/>
  <text x="60" y="44" font-size="20" font-weight="700" fill="#14110f">Most Pro "churn" is rationalization</text>
  <text x="60" y="66" font-size="12" fill="#7a7066">5 Pro accounts canceled a subscription · what happened to the account</text>
  <!-- two big blocks -->
  <g>
    <rect x="80" y="110" width="360" height="150" rx="6" fill="#2f5d52"/>
    <text x="260" y="170" text-anchor="middle" font-size="56" font-weight="700" fill="#f4efe6">4</text>
    <text x="260" y="205" text-anchor="middle" font-size="14" fill="#e8e0d4">still active (rationalized)</text>
    <text x="260" y="230" text-anchor="middle" font-size="11" fill="#bcd0c8">dropped a sub, account retained</text>

    <rect x="460" y="110" width="180" height="150" rx="6" fill="#b8431f"/>
    <text x="550" y="170" text-anchor="middle" font-size="56" font-weight="700" fill="#f4efe6">1</text>
    <text x="550" y="205" text-anchor="middle" font-size="14" fill="#f4efe6">true logo exit</text>
    <text x="550" y="230" text-anchor="middle" font-size="11" fill="#f0c9bb">(in 2024, not 2025)</text>
  </g>
  <text x="80" y="300" font-size="13" fill="#14110f" font-weight="700">2025 cancellations: 3 accounts, all retained an active subscription &#8594; 0 true exits.</text>
  <text x="80" y="324" font-size="11" fill="#7a7066">Two accounts canceled two subscriptions each. Logo churn in 2025 = 0 of 15 Pro accounts.</text>
</svg>
