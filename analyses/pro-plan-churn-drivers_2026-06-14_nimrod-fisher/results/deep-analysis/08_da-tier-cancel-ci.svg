<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" preserveAspectRatio="xMidYMid meet" font-family="'IBM Plex Mono', monospace">
  <rect width="760" height="360" fill="#f4efe6"/>
  <text x="60" y="42" font-size="20" font-weight="700" fill="#14110f">Cancel rate: entry vs premium (95% CI)</text>
  <text x="60" y="64" font-size="12" fill="#7a7066">Wilson intervals · wide CIs reflect small n · Fisher exact p=0.15</text>
  <!-- x axis 0..70% over 200..720 px => 7.43px per % -->
  <line x1="200" y1="90" x2="200" y2="300" stroke="#14110f" stroke-width="1.5"/>
  <line x1="200" y1="300" x2="720" y2="300" stroke="#14110f" stroke-width="1.5"/>
  <g font-size="11" fill="#7a7066">
    <line x1="200" y1="90" x2="200" y2="300" stroke="#ddd2c2"/><text x="200" y="318" text-anchor="middle">0%</text>
    <line x1="349" y1="90" x2="349" y2="300" stroke="#ddd2c2"/><text x="349" y="318" text-anchor="middle">20%</text>
    <line x1="498" y1="90" x2="498" y2="300" stroke="#ddd2c2"/><text x="498" y="318" text-anchor="middle">40%</text>
    <line x1="646" y1="90" x2="646" y2="300" stroke="#ddd2c2"/><text x="646" y="318" text-anchor="middle">60%</text>
    <text x="460" y="340" text-anchor="middle" fill="#14110f">subscription cancel rate</text>
  </g>
  <!-- entry $29: point 0%, CI [0,29.9] -->
  <text x="190" y="150" text-anchor="end" font-size="13" fill="#14110f">entry $29</text>
  <text x="190" y="166" text-anchor="end" font-size="10" fill="#7a7066">0/9</text>
  <line x1="200" y1="145" x2="422" y2="145" stroke="#2f5d52" stroke-width="2"/>
  <line x1="200" y1="138" x2="200" y2="152" stroke="#2f5d52" stroke-width="2"/>
  <line x1="422" y1="138" x2="422" y2="152" stroke="#2f5d52" stroke-width="2"/>
  <circle cx="200" cy="145" r="6" fill="#2f5d52"/>
  <text x="210" y="132" font-size="12" font-weight="700" fill="#2f5d52">0.0%</text>
  <!-- premium: point 30.4%, CI [15.6, 50.9] -->
  <text x="190" y="235" text-anchor="end" font-size="13" fill="#14110f">premium $79+$199</text>
  <text x="190" y="251" text-anchor="end" font-size="10" fill="#7a7066">7/23</text>
  <line x1="316" y1="230" x2="578" y2="230" stroke="#b8431f" stroke-width="2"/>
  <line x1="316" y1="223" x2="316" y2="237" stroke="#b8431f" stroke-width="2"/>
  <line x1="578" y1="223" x2="578" y2="237" stroke="#b8431f" stroke-width="2"/>
  <circle cx="426" cy="230" r="6" fill="#b8431f"/>
  <text x="436" y="217" font-size="12" font-weight="700" fill="#b8431f">30.4%</text>
  <text x="60" y="354" font-size="11" fill="#7a7066">Risk difference 30.4pp. Direction is clear; significance is not, at n=32 subs.</text>
</svg>
