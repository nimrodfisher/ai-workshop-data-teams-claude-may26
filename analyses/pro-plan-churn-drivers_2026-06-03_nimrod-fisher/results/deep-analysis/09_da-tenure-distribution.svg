<svg viewBox="0 0 580 440" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" width="580" height="440">
  <rect width="580" height="440" fill="#FAFAFA"/>
  <text x="290" y="38" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#222" text-anchor="middle">Tenure Distribution: Active vs Canceled Subs</text>
  <text x="290" y="57" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">PRO plan · canceled n=7 · active n=25 · days from start to cancel/today</text>

  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="370" stroke="#bbb" stroke-width="1"/>
  <!-- X axis -->
  <line x1="100" y1="370" x2="480" y2="370" stroke="#bbb" stroke-width="1"/>

  <!-- Y ticks: 0-750 days, factor=290/750=0.387 -->
  <!-- y = 370 - days*0.387 -->
  <line x1="94" y1="370" x2="100" y2="370" stroke="#999" stroke-width="1"/>
  <text x="90" y="374" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">0</text>

  <line x1="94" y1="331" x2="100" y2="331" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="331" x2="480" y2="331" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="335" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">100</text>

  <line x1="94" y1="293" x2="100" y2="293" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="293" x2="480" y2="293" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="297" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">200</text>

  <line x1="94" y1="254" x2="100" y2="254" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="254" x2="480" y2="254" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="258" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">300</text>

  <line x1="94" y1="215" x2="100" y2="215" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="215" x2="480" y2="215" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="219" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">400</text>

  <line x1="94" y1="177" x2="100" y2="177" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="177" x2="480" y2="177" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="181" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">500</text>

  <line x1="94" y1="138" x2="100" y2="138" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="138" x2="480" y2="138" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="142" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">600</text>

  <line x1="94" y1="99" x2="100" y2="99" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="99" x2="480" y2="99" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="90" y="103" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">700</text>

  <text x="40" y="225" font-family="Arial,sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(-90,40,225)">Tenure (days)</text>

  <!-- CANCELED box: center x=200 -->
  <!-- min=15 → y=364, p25=21 → y=362, median=75 → y=341, p75=125 → y=322, max=339 → y=239 -->
  <!-- Box (p25 to p75): y=322 to y=362, height=40 -->
  <!-- Whisker bottom (min to p25): 362 to 364 -->
  <!-- Whisker top (p75 to max): 239 to 322 -->
  <line x1="200" y1="364" x2="200" y2="362" stroke="#E05A5A" stroke-width="1.5"/>
  <rect x="170" y="322" width="60" height="40" fill="#E05A5A" fill-opacity="0.3" stroke="#E05A5A" stroke-width="1.5" rx="2"/>
  <line x1="170" y1="341" x2="230" y2="341" stroke="#E05A5A" stroke-width="2.5"/>
  <line x1="200" y1="239" x2="200" y2="322" stroke="#E05A5A" stroke-width="1.5"/>
  <!-- Whisker caps -->
  <line x1="185" y1="364" x2="215" y2="364" stroke="#E05A5A" stroke-width="1.5"/>
  <line x1="185" y1="239" x2="215" y2="239" stroke="#E05A5A" stroke-width="1.5"/>

  <!-- Individual canceled data points: 15,18,24,75,102,147,339 days -->
  <!-- y: 364,363,361,341,330,313,239 -->
  <circle cx="200" cy="364" r="4" fill="#E05A5A" fill-opacity="0.8"/>
  <circle cx="200" cy="363" r="4" fill="#E05A5A" fill-opacity="0.8"/>
  <circle cx="200" cy="361" r="4" fill="#E05A5A" fill-opacity="0.8"/>
  <circle cx="200" cy="341" r="4" fill="#E05A5A" fill-opacity="0.8"/>
  <circle cx="200" cy="330" r="4" fill="#E05A5A" fill-opacity="0.8"/>
  <circle cx="200" cy="313" r="4" fill="#E05A5A" fill-opacity="0.8"/>
  <circle cx="200" cy="239" r="4" fill="#E05A5A" fill-opacity="0.8"/>

  <!-- Median label -->
  <text x="238" y="345" font-family="Arial,sans-serif" font-size="10" fill="#C0392B" text-anchor="start">median 75d</text>

  <!-- ACTIVE box: center x=360 -->
  <!-- min=374 → y=225, p25=432 → y=203, median=505 → y=175, p75=595 → y=140, max=710 → y=95 -->
  <!-- Box (p25 to p75): y=140 to y=203, height=63 -->
  <line x1="360" y1="225" x2="360" y2="203" stroke="#4A9B8F" stroke-width="1.5"/>
  <rect x="330" y="140" width="60" height="63" fill="#4A9B8F" fill-opacity="0.3" stroke="#4A9B8F" stroke-width="1.5" rx="2"/>
  <line x1="330" y1="175" x2="390" y2="175" stroke="#4A9B8F" stroke-width="2.5"/>
  <line x1="360" y1="95" x2="360" y2="140" stroke="#4A9B8F" stroke-width="1.5"/>
  <!-- Whisker caps -->
  <line x1="345" y1="225" x2="375" y2="225" stroke="#4A9B8F" stroke-width="1.5"/>
  <line x1="345" y1="95" x2="375" y2="95" stroke="#4A9B8F" stroke-width="1.5"/>

  <!-- Median label -->
  <text x="398" y="179" font-family="Arial,sans-serif" font-size="10" fill="#1A7A6E" text-anchor="start">median 505d</text>

  <!-- X labels -->
  <text x="200" y="393" font-family="Arial,sans-serif" font-size="12" fill="#C0392B" text-anchor="middle" font-weight="bold">Canceled</text>
  <text x="200" y="408" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">n=7 subscriptions</text>
  <text x="360" y="393" font-family="Arial,sans-serif" font-size="12" fill="#1A7A6E" text-anchor="middle" font-weight="bold">Active</text>
  <text x="360" y="408" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">n=25 subscriptions</text>

  <!-- Gap annotation -->
  <line x1="202" y1="341" x2="330" y2="175" stroke="#999" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="280" y="265" font-family="Arial,sans-serif" font-size="10" fill="#777" text-anchor="middle" transform="rotate(-28,280,265)">6.7x gap</text>

  <!-- Note -->
  <text x="290" y="428" font-family="Arial,sans-serif" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Box = IQR (p25-p75) · Line = median · Dots = individual canceled subs · Whiskers = min/max</text>
</svg>
