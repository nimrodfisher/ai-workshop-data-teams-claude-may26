<svg viewBox="0 0 560 380" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" width="560" height="380">
  <rect width="560" height="380" fill="#FAFAFA"/>
  <text x="280" y="38" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#222" text-anchor="middle">Subscription Cancel Rate by Price Tier</text>
  <text x="280" y="57" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">PRO plan · canceled/(active+canceled) · trialing excluded</text>

  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="300" stroke="#bbb" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="300" x2="480" y2="300" stroke="#bbb" stroke-width="1"/>

  <!-- Y ticks: 0-40%, factor=220/40=5.5px per % -->
  <!-- y = 300 - pct*5.5 -->
  <line x1="74" y1="300" x2="80" y2="300" stroke="#999" stroke-width="1"/>
  <text x="70" y="304" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">0%</text>

  <line x1="74" y1="245" x2="80" y2="245" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="245" x2="480" y2="245" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="249" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">10%</text>

  <line x1="74" y1="190" x2="80" y2="190" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="190" x2="480" y2="190" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="194" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">20%</text>

  <line x1="74" y1="135" x2="80" y2="135" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="135" x2="480" y2="135" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="139" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">30%</text>

  <line x1="74" y1="80" x2="80" y2="80" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="80" x2="480" y2="80" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="84" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">40%</text>

  <text x="28" y="190" font-family="Arial,sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(-90,28,190)">Cancel Rate</text>

  <!-- $29/mo bar: cancel_rate=0%, h=0 -->
  <rect x="120" y="300" width="80" height="1" fill="#4A9B8F" rx="2"/>
  <text x="160" y="316" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle" font-weight="bold">$29/mo</text>
  <text x="160" y="332" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">9 active, 0 canceled</text>
  <text x="160" y="297" font-family="Arial,sans-serif" font-size="11" fill="#1A7A6E" text-anchor="middle" font-weight="bold">0%</text>

  <!-- $79/mo bar: cancel_rate=28.6%, h=28.6*5.5=157, y=300-157=143 -->
  <rect x="240" y="143" width="80" height="157" fill="#F5A623" rx="2"/>
  <text x="280" y="316" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle" font-weight="bold">$79/mo</text>
  <text x="280" y="332" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">5 active, 2 canceled</text>
  <text x="280" y="140" font-family="Arial,sans-serif" font-size="11" fill="#C07000" text-anchor="middle" font-weight="bold">28.6%</text>

  <!-- $199/mo bar: cancel_rate=31.3%, h=31.3*5.5=172, y=300-172=128 -->
  <rect x="360" y="128" width="80" height="172" fill="#E05A5A" rx="2"/>
  <text x="400" y="316" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle" font-weight="bold">$199/mo</text>
  <text x="400" y="332" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">11 active, 5 canceled</text>
  <text x="400" y="125" font-family="Arial,sans-serif" font-size="11" fill="#C0392B" text-anchor="middle" font-weight="bold">31.3%</text>

  <!-- Key annotation -->
  <text x="280" y="358" font-family="Arial,sans-serif" font-size="10" fill="#C0392B" text-anchor="middle" font-style="italic">$29 tier: zero cancellations · $79 and $199 tiers cancel at ~30%</text>
</svg>
