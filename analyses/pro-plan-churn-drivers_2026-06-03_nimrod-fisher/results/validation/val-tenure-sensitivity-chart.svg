<svg viewBox="0 0 700 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="700" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">
    Canceled Subscriptions by Tenure Bucket
  </text>
  <text x="350" y="56" text-anchor="middle" font-size="12" fill="#555">
    PRO plan, n=7 — threshold sensitivity check
  </text>

  <!-- Chart area: left=100, right=620, top=80, bottom=340 -->
  <!-- Y axis: 0 to 3 (max canceled_subs) -->
  <!-- Bar width ~70, gap ~30 -->

  <!-- Y grid lines and labels -->
  <!-- Y=340 → 0; Y=260 → 1; Y=180 → 2; Y=100 → 3 (scale: 80px per unit) -->
  <line x1="100" y1="340" x2="620" y2="340" stroke="#ccc" stroke-width="1"/>
  <line x1="100" y1="260" x2="620" y2="260" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="180" x2="620" y2="180" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="100" x2="620" y2="100" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y axis line -->
  <line x1="100" y1="80" x2="100" y2="340" stroke="#aaa" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="88" y="344" text-anchor="end" font-size="12" fill="#555">0</text>
  <text x="88" y="264" text-anchor="end" font-size="12" fill="#555">1</text>
  <text x="88" y="184" text-anchor="end" font-size="12" fill="#555">2</text>
  <text x="88" y="104" text-anchor="end" font-size="12" fill="#555">3</text>

  <!-- Y axis title -->
  <text x="30" y="210" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,30,210)">Canceled Subscriptions</text>

  <!-- Bars (5 buckets, evenly spaced in 520px width, starting at x=100) -->
  <!-- Bucket width: 520/5 = 104px; bar width: 60px; offset within bucket: 22px -->

  <!-- 0-60 days: 3 cancels → height = 3*80 = 240, y = 340-240 = 100 -->
  <rect x="122" y="100" width="60" height="240" fill="#e74c3c" rx="3" opacity="0.85"/>
  <text x="152" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">3</text>

  <!-- 61-90 days: 1 cancel → height = 80, y = 260 -->
  <rect x="226" y="260" width="60" height="80" fill="#e67e22" rx="3" opacity="0.85"/>
  <text x="256" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">1</text>

  <!-- 91-120 days: 1 cancel -->
  <rect x="330" y="260" width="60" height="80" fill="#f39c12" rx="3" opacity="0.85"/>
  <text x="360" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#f39c12">1</text>

  <!-- 121-180 days: 1 cancel -->
  <rect x="434" y="260" width="60" height="80" fill="#27ae60" rx="3" opacity="0.85"/>
  <text x="464" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">1</text>

  <!-- 270+ days: 1 cancel -->
  <rect x="538" y="260" width="60" height="80" fill="#2980b9" rx="3" opacity="0.85"/>
  <text x="568" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">1</text>

  <!-- X axis labels -->
  <text x="152" y="360" text-anchor="middle" font-size="10" fill="#333">0–60</text>
  <text x="152" y="373" text-anchor="middle" font-size="10" fill="#333">days</text>
  <text x="256" y="360" text-anchor="middle" font-size="10" fill="#333">61–90</text>
  <text x="256" y="373" text-anchor="middle" font-size="10" fill="#333">days</text>
  <text x="360" y="360" text-anchor="middle" font-size="10" fill="#333">91–120</text>
  <text x="360" y="373" text-anchor="middle" font-size="10" fill="#333">days</text>
  <text x="464" y="360" text-anchor="middle" font-size="10" fill="#333">121–180</text>
  <text x="464" y="373" text-anchor="middle" font-size="10" fill="#333">days</text>
  <text x="568" y="360" text-anchor="middle" font-size="10" fill="#333">270+</text>
  <text x="568" y="373" text-anchor="middle" font-size="10" fill="#333">days</text>

  <!-- Annotation: cumulative thresholds -->
  <!-- 57% at 90d marker: between bar 1 and 2 -->
  <line x1="286" y1="88" x2="286" y2="345" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="290" y="88" font-size="10" fill="#e74c3c" font-weight="bold">57% by 90d (4/7)</text>

  <!-- 71% at 120d marker: between bar 2 and 3 -->
  <line x1="390" y1="108" x2="390" y2="345" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="394" y="108" font-size="10" fill="#e67e22" font-weight="bold">71% by 120d (5/7)</text>

  <!-- Note: all 0-60 are $199 -->
  <text x="350" y="398" text-anchor="middle" font-size="11" fill="#888">All 0–60 day cancels: $199/mo tier. $79/mo cancels appear only at 121+ days.</text>

</svg>
