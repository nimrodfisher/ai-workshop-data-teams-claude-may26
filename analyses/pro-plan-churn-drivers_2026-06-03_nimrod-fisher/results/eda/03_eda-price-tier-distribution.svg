<svg viewBox="0 0 640 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" width="640" height="420">
  <rect width="640" height="420" fill="#FAFAFA"/>
  <text x="320" y="38" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#222" text-anchor="middle">Price Tier: Active vs Canceled Subscriptions</text>
  <text x="320" y="58" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Count of PRO subscriptions by monthly price · Active n=25 · Canceled n=7</text>

  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="330" stroke="#bbb" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="330" x2="560" y2="330" stroke="#bbb" stroke-width="1"/>

  <!-- Y ticks: 0-12, factor=250/12=20.83px -->
  <!-- y = 330 - value*20.83 -->
  <line x1="74" y1="330" x2="80" y2="330" stroke="#999" stroke-width="1"/>
  <text x="70" y="334" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">0</text>

  <line x1="74" y1="288" x2="80" y2="288" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="288" x2="560" y2="288" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="292" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">2</text>

  <line x1="74" y1="247" x2="80" y2="247" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="247" x2="560" y2="247" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="251" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">4</text>

  <line x1="74" y1="205" x2="80" y2="205" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="205" x2="560" y2="205" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="209" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">6</text>

  <line x1="74" y1="163" x2="80" y2="163" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="163" x2="560" y2="163" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="167" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">8</text>

  <line x1="74" y1="122" x2="80" y2="122" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="122" x2="560" y2="122" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="126" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">10</text>

  <line x1="74" y1="80" x2="80" y2="80" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="80" x2="560" y2="80" stroke="#e5e5e5" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="70" y="84" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">12</text>

  <text x="30" y="205" font-family="Arial,sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(-90,30,205)">Subscription Count</text>

  <!-- Groups: $29 at x=113, $79 at x=266, $199 at x=419 -->
  <!-- barW=50, innerGap=8 -->
  <!-- Active (teal), Canceled (coral) -->

  <!-- $29 group -->
  <!-- Active $29: count=9, h=9*20.83=187, y=330-187=143 -->
  <rect x="113" y="143" width="50" height="187" fill="#4A9B8F" rx="2"/>
  <text x="138" y="140" font-family="Arial,sans-serif" font-size="10" fill="#1A7A6E" text-anchor="middle" font-weight="bold">9</text>
  <!-- Canceled $29: count=0, no bar -->
  <rect x="171" y="330" width="50" height="0" fill="#E05A5A" rx="2"/>
  <text x="196" y="326" font-family="Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">0</text>
  <!-- Group label -->
  <text x="163" y="355" font-family="Arial,sans-serif" font-size="11" fill="#444" text-anchor="middle" font-weight="bold">$29/mo</text>

  <!-- $79 group -->
  <!-- Active $79: count=5, h=104, y=226 -->
  <rect x="266" y="226" width="50" height="104" fill="#4A9B8F" rx="2"/>
  <text x="291" y="223" font-family="Arial,sans-serif" font-size="10" fill="#1A7A6E" text-anchor="middle" font-weight="bold">5</text>
  <!-- Canceled $79: count=2, h=42, y=288 -->
  <rect x="324" y="288" width="50" height="42" fill="#E05A5A" rx="2"/>
  <text x="349" y="285" font-family="Arial,sans-serif" font-size="10" fill="#C0392B" text-anchor="middle" font-weight="bold">2</text>
  <!-- Group label -->
  <text x="316" y="355" font-family="Arial,sans-serif" font-size="11" fill="#444" text-anchor="middle" font-weight="bold">$79/mo</text>

  <!-- $199 group -->
  <!-- Active $199: count=11, h=229, y=101 -->
  <rect x="419" y="101" width="50" height="229" fill="#4A9B8F" rx="2"/>
  <text x="444" y="98" font-family="Arial,sans-serif" font-size="10" fill="#1A7A6E" text-anchor="middle" font-weight="bold">11</text>
  <!-- Canceled $199: count=5, h=104, y=226 -->
  <rect x="477" y="226" width="50" height="104" fill="#E05A5A" rx="2"/>
  <text x="502" y="223" font-family="Arial,sans-serif" font-size="10" fill="#C0392B" text-anchor="middle" font-weight="bold">5</text>
  <!-- Group label -->
  <text x="469" y="355" font-family="Arial,sans-serif" font-size="11" fill="#444" text-anchor="middle" font-weight="bold">$199/mo</text>

  <!-- Annotation: $199 has highest cancel rate -->
  <text x="502" y="370" font-family="Arial,sans-serif" font-size="9" fill="#C0392B" text-anchor="middle" font-style="italic">31% cancel rate</text>
  <text x="349" y="370" font-family="Arial,sans-serif" font-size="9" fill="#C0392B" text-anchor="middle" font-style="italic">29% cancel rate</text>
  <text x="196" y="370" font-family="Arial,sans-serif" font-size="9" fill="#1A7A6E" text-anchor="middle" font-style="italic">0% cancel rate</text>

  <!-- Legend -->
  <rect x="190" y="393" width="11" height="11" fill="#4A9B8F" rx="2"/>
  <text x="205" y="402" font-family="Arial,sans-serif" font-size="10" fill="#444">Active subscriptions</text>
  <rect x="360" y="393" width="11" height="11" fill="#E05A5A" rx="2"/>
  <text x="375" y="402" font-family="Arial,sans-serif" font-size="10" fill="#444">Canceled subscriptions</text>
</svg>
