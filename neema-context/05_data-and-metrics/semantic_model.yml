version: 2

models:
  # ============================================================================
  - name: dw_fact_user_campaign_event
    meta:
      context_file: 05_data-and-metrics/semantic-model/dw_fact_user_campaign_event.yml
    database: NEEMA_BI
    schema: DW_FACT
    description: |
      Campaign event fact. One row per user-campaign interaction across all
      marketing channels — Braze campaigns, Braze canvases, messaging
      (SMS / email / push / in-app / webhook), and referrer incentives.
      Captures the send/impression event, the campaign taxonomy (name, type,
      cost category), and the associated bonus transaction when a reward was
      credited to the user.  CAMPAIGN_SOURCE_ID identifies the originating
      platform: 1=messaging, 2=braze_campaign, 3=braze_canvas,
      4=referrer_incentive_users, 5=referrer_incentive_agents.
    synonyms: [campaign events, user campaigns, marketing campaigns, fact user campaign event, campaign interactions, incentive events]
    columns:
      - name: USER_CAMPAIGN_UNIQUE_ID
        description: Surrogate primary key. MD5 hash of USER_ID and EVENT_ID, unique per campaign interaction row.
        data_type: TEXT
        synonyms: [user campaign unique id, campaign event id, row id, surrogate key]
        constraints:
          - type: primary_key
          - type: not_null
      - name: CAMPAIGN_SOURCE_ID
        description: Numeric source-system code identifying the campaign platform. 1=messaging, 2=braze_campaign, 3=braze_canvas, 4=referrer_incentive_users, 5=referrer_incentive_agents.
        data_type: NUMBER
        synonyms: [campaign source id, source id, campaign platform id]
        sample_values: [1, 2, 3, 4, 5]
      - name: EVENT_ID
        description: Unique event identifier from the originating platform (e.g. Braze event UUID).
        data_type: TEXT
        synonyms: [event id, braze event id, platform event id]
      - name: USER_ID
        description: Owning user UUID. Foreign key to dw_dim_user.USER_ID.
        data_type: BINARY
        synonyms: [user id, customer id, user uuid]
      - name: NEEMA_ID
        description: Owning user's numeric Neema id. Foreign key to dw_dim_user.NEEMA_ID.
        data_type: NUMBER
        synonyms: [neema id, customer number, user number]
      - name: EVENT_CREATED_AT
        description: Timestamp the campaign event was fired (send / impression time, no time zone).
        data_type: TIMESTAMP_NTZ
        synonyms: [event created at, event time, campaign event timestamp, send time, when]
      - name: CHANNEL
        description: Communication channel of the campaign event.
        data_type: TEXT
        synonyms: [channel, campaign channel, communication channel, medium]
        sample_values: [email, push, sms, webhook, impression, referral]
      - name: CAMPAIGN_NAME
        description: Name of the campaign, canvas, or incentive program.
        data_type: TEXT
        synonyms: [campaign name, campaign, name]
      - name: CAMPAIGN_TYPE
        description: Classification / type of the campaign (e.g. promotional, transactional, lifecycle).
        data_type: TEXT
        synonyms: [campaign type, type, campaign category]
      - name: COST_CATEGORY
        description: Budget / cost category assigned to the campaign (used for marketing spend attribution).
        data_type: TEXT
        synonyms: [cost category, budget category, campaign cost type]
      - name: CAMPAIGN_ID
        description: Platform-level campaign or canvas identifier (Braze campaign_id or canvas_id).
        data_type: TEXT
        synonyms: [campaign id, braze campaign id, canvas id]
      - name: STEP_ID
        description: Canvas step UUID. Populated only for Braze canvas events (CAMPAIGN_SOURCE_ID=3); NULL for all other sources.
        data_type: TEXT
        synonyms: [step id, canvas step id]
      - name: STEP_NAME
        description: Canvas step name. Populated only for Braze canvas events; NULL for all other sources.
        data_type: TEXT
        synonyms: [step name, canvas step name]
      - name: BONUS_TRANSACTION_ID
        description: UUID of the bonus/reward transaction credited to the user as a result of this campaign event. Foreign key to dw_fact_transaction.TRANSACTION_ID. NULL when no bonus was paid.
        data_type: BINARY
        synonyms: [bonus transaction id, incentive transaction id, campaign bonus id, reward transaction id]
      - name: BONUS_AMOUNT_ILS
        description: Bonus amount credited to the user in ILS. NULL when no bonus was paid.
        data_type: NUMBER
        synonyms: [bonus amount ils, incentive amount ils, reward ils, bonus ils]
      - name: BONUS_AMOUNT_USD
        description: Bonus amount credited to the user in USD. NULL when no bonus was paid.
        data_type: NUMBER
        synonyms: [bonus amount usd, incentive amount usd, reward usd, bonus usd]
      - name: CAMPAIGN_BONUS_RECEIVED_AT
        description: Timestamp the campaign bonus transaction was received by the user (no time zone). NULL when no bonus was paid.
        data_type: TIMESTAMP_NTZ
        synonyms: [campaign bonus received at, bonus received at, incentive received at, reward received at]
      - name: CANCELLED
        description: True when the campaign event's associated bonus transaction was cancelled.
        data_type: BOOLEAN
        synonyms: [cancelled, is cancelled, voided]
        sample_values: [true, false]
      - name: DW_UPDATE_DATE
        description: Timestamp this row was last loaded/updated by the data warehouse.
        data_type: TIMESTAMP_NTZ
        synonyms: [dw update date, etl load date, last updated]
    relationships:
      - from_model: dw_fact_user_campaign_event
        from_column: USER_ID
        to_model: dw_dim_user
        to_column: USER_ID
        description: Each campaign event belongs to one user.
      - from_model: dw_fact_user_campaign_event
        from_column: NEEMA_ID
        to_model: dw_dim_user
        to_column: NEEMA_ID
        description: Alternate user join on the numeric Neema id.
      - from_model: dw_fact_user_campaign_event
        from_column: BONUS_TRANSACTION_ID
        to_model: dw_fact_transaction
        to_column: TRANSACTION_ID
        description: Campaign bonus events link to their underlying wallet credit transaction.

  # ============================================================================
  - name: dw_fact_max_transaction
    meta:
      context_file: 05_data-and-metrics/semantic-model/dw_fact_max_transaction.yml
    database: NEEMA_BI
    schema: DW_FACT
    description: |
      Max (Kasefet) card transaction fact. One row per physical or virtual
      card transaction processed by the Max / LeumiCard network, covering
      both Mastercard (sub-group 09603) and Visa (sub-groups 00608 / 00610)
      card programmes.  Sourced from daily clearance files delivered by Max
      and enriched with Neema user identity via the dw_dim_max_cards card
      master.  Amounts are provided in both the original transaction currency
      and the account charge currency; merchant details, MCC, and VAT/
      commission breakdowns are included.
    synonyms: [max card transactions, card transactions, kasefet transactions, debit card transactions, max transactions, credit card transactions]
    columns:
      - name: MAX_TRANSACTION_ID
        description: Surrogate primary key. Composite key built from card serial (CID), authorization code, file date, and sub-group program name.
        data_type: TEXT
        synonyms: [max transaction id, card transaction id, row id, surrogate key]
        constraints:
          - type: primary_key
          - type: not_null
      - name: USER_ID
        description: Owning user UUID, resolved via the card master. Foreign key to dw_dim_user.USER_ID.
        data_type: BINARY
        synonyms: [user id, customer id, cardholder id]
      - name: NEEMA_ID
        description: Owning user's numeric Neema id. Foreign key to dw_dim_user.NEEMA_ID.
        data_type: NUMBER
        synonyms: [neema id, customer number, cardholder neema id]
      - name: CARD_SERIAL_CID
        description: Physical card serial / CID number (leading zeros stripped). Used to join to dw_dim_max_cards.CID.
        data_type: TEXT
        synonyms: [card serial cid, cid, card serial, card number]
      - name: CARD_ID
        description: Internal Neema card identifier. Foreign key to dw_dim_max_cards.CARD_ID.
        data_type: TEXT
        synonyms: [card id, neema card id]
      - name: SUB_GROUP_PROGRAM_NAME
        description: Card programme code identifying the card scheme. 09603=Mastercard, 00608/00610=Visa.
        data_type: TEXT
        synonyms: [sub group program name, card programme, card scheme, card program code]
        sample_values: ["09603", "00608", "00610"]
      - name: CURRENCY_TYPE
        description: Original currency code of the transaction as reported by the card scheme.
        data_type: TEXT
        synonyms: [currency type, original currency]
      - name: AUTHORIZATION_CODE
        description: Authorization code assigned by the issuer during approval.
        data_type: TEXT
        synonyms: [authorization code, auth code, approval code]
      - name: TRANSACTION_STATUS
        description: Settlement/processing status of the card transaction.
        data_type: TEXT
        synonyms: [transaction status, status, card transaction status]
        sample_values: [Approved, Declined, Reversed]
      - name: TRANSACTION_EXECUTION_DATE
        description: Timestamp the transaction was executed / presented (no time zone).
        data_type: TIMESTAMP_NTZ
        synonyms: [transaction execution date, execution date, transaction date, when]
      - name: TRANSACTION_RECEIPT_DATE_LEUMI_CARD
        description: Timestamp Max / LeumiCard received and processed the transaction record.
        data_type: TIMESTAMP_NTZ
        synonyms: [transaction receipt date leumi card, receipt date, clearing date, settlement date]
      - name: MOVEMENT_CODE
        description: Numeric movement/transaction type code from the Max clearance file.
        data_type: TEXT
        synonyms: [movement code, transaction type code, movement type]
      - name: MOVEMENT_CODE_DESCRIPTION
        description: Human-readable description of the movement code.
        data_type: TEXT
        synonyms: [movement code description, movement description, transaction type description]
        sample_values: [Purchase, Refund, "Cash Advance", "Balance Inquiry"]
      - name: CARD_USAGE_METHOD_CODE
        description: Numeric code identifying how the card was presented for the transaction.
        data_type: TEXT
        synonyms: [card usage method code, usage method code, card presentation code]
      - name: CARD_USAGE_METHOD_DESCRIPTION
        description: Human-readable description of how the card was used.
        data_type: TEXT
        synonyms: [card usage method description, card usage, presentation method]
        sample_values: [Chip, Contactless, "Magnetic Stripe", Online, "Manual Entry"]
      - name: SMART_TRANSACTION_INDICATOR
        description: True when the transaction was flagged as a smart (tokenised / contactless) transaction.
        data_type: BOOLEAN
        synonyms: [smart transaction indicator, is smart transaction, contactless flag]
        sample_values: [true, false]
      - name: TRANSACTION_CURRENCY
        description: ISO currency code of the transaction amount as charged.
        data_type: TEXT
        synonyms: [transaction currency, charge currency, billing currency]
        sample_values: [ILS, USD, EUR, GBP, THB]
      - name: AMOUNT_SOURCE_CURRENCY
        description: Transaction amount in the original (source) currency — the currency the merchant charged in.
        data_type: NUMBER
        synonyms: [amount source currency, original amount, foreign currency amount]
      - name: AMOUNT_CHARGE_CURRENCY
        description: Transaction amount in the account/charge currency (ILS for most Neema cards).
        data_type: NUMBER
        synonyms: [amount charge currency, charge amount, billed amount, amount ils]
      - name: EXCHANGE_RATE
        description: FX rate applied to convert the source-currency amount to the charge currency.
        data_type: NUMBER
        synonyms: [exchange rate, fx rate, conversion rate]
      - name: MERCHANT_NUMBER
        description: Merchant identifier assigned by the acquiring bank.
        data_type: TEXT
        synonyms: [merchant number, merchant id, acquirer merchant id]
      - name: MERCHANT_NAME
        description: Merchant name as reported in the clearance file (Hebrew / local language).
        data_type: TEXT
        synonyms: [merchant name, store name, business name]
      - name: MERCHANT_NAME_ENGLISH_TRANSACTION
        description: Merchant name in English as reported in the clearance (transaction) file.
        data_type: TEXT
        synonyms: [merchant name english transaction, merchant name english, merchant english]
      - name: UNIFIED_ADDRESS
        description: Merchant's unified address string.
        data_type: TEXT
        synonyms: [unified address, merchant address, address]
      - name: CITY
        description: City where the merchant is located.
        data_type: TEXT
        synonyms: [city, merchant city, location city]
      - name: COUNTRY
        description: Country where the merchant is located.
        data_type: TEXT
        synonyms: [country, merchant country, location country]
        sample_values: [Israel, "United States", Thailand, Philippines, India, Germany]
      - name: MCC4_CODE
        description: 4-digit Merchant Category Code (MCC) identifying the merchant's industry.
        data_type: TEXT
        synonyms: [mcc4 code, mcc, merchant category code, merchant category]
        sample_values: ["5411", "5541", "5812", "5999", "6011"]
      - name: VAT_AMOUNT
        description: VAT component of the transaction in the charge currency.
        data_type: NUMBER
        synonyms: [vat amount, tax amount, vat]
      - name: COMMISSION_AMOUNT
        description: Commission / interchange component charged on the transaction.
        data_type: NUMBER
        synonyms: [commission amount, commission, interchange amount]
      - name: TOTAL_AMOUNT
        description: Total billed amount (principal + VAT + commission) in the charge currency.
        data_type: NUMBER
        synonyms: [total amount, total, billed amount, final amount]
      - name: DW_UPDATE_DATE
        description: Timestamp this row was last loaded/updated by the data warehouse.
        data_type: TIMESTAMP_NTZ
        synonyms: [dw update date, etl load date, last updated]
    relationships:
      - from_model: dw_fact_max_transaction
        from_column: USER_ID
        to_model: dw_dim_user
        to_column: USER_ID
        description: Each card transaction belongs to one cardholder (Neema user).
      - from_model: dw_fact_max_transaction
        from_column: NEEMA_ID
        to_model: dw_dim_user
        to_column: NEEMA_ID
        description: Alternate cardholder join on the numeric Neema id.
      - from_model: dw_fact_max_transaction
        from_column: CARD_ID
        to_model: dw_dim_max_cards
        to_column: CARD_ID
        description: Each card transaction links to the card master record.

  # ============================================================================
  - name: dw_fact_user_monthly_kpis
    meta:
      context_file: 05_data-and-metrics/semantic-model/dw_fact_user_monthly_kpis.yml
    database: NEEMA_BI
    schema: DW_FACT
    description: |
      User-level KPI fact aggregated by calendar month. One row per
      (user, month) with counts and amounts for transactions, deposits,
      remittances, fees, salary, logins, and active products for that month.
      Unlike the all-time dw_fact_user_kpis table, this table includes
      months where the user was inactive (zero-filled rows are present for
      the full calendar range).  Also carries three consecutive-month streak
      columns (engagement, activity, inactivity) useful for cohort and
      churn analysis.
    synonyms: [user monthly kpis, monthly kpis, monthly user metrics, user monthly summary, fact user monthly kpis, monthly performance]
    columns:
      - name: USER_ID
        description: User UUID. Composite primary key (USER_ID + KPI_MONTH). Foreign key to dw_dim_user.USER_ID.
        data_type: BINARY
        synonyms: [user id, customer id, user uuid]
        constraints:
          - type: not_null
      - name: NEEMA_ID
        description: Numeric Neema id for the user. Foreign key to dw_dim_user.NEEMA_ID.
        data_type: NUMBER
        synonyms: [neema id, customer number, user number]
      - name: KPI_MONTH
        description: First day of the calendar month this KPI row covers. Composite primary key (USER_ID + KPI_MONTH).
        data_type: DATE
        synonyms: [kpi month, month, period, reporting month]
        constraints:
          - type: not_null
      - name: TOTAL_TRANSACTIONS
        description: Total count of all transactions (active + cancelled) in the month.
        data_type: NUMBER
        synonyms: [total transactions, transaction count, transactions]
      - name: CANCELLED_TRANSACTIONS
        description: Count of cancelled transactions in the month.
        data_type: NUMBER
        synonyms: [cancelled transactions, cancelled txns]
      - name: ACTIVE_TRANSACTIONS
        description: Count of active (non-cancelled) transactions in the month.
        data_type: NUMBER
        synonyms: [active transactions, active txns, completed transactions]
      - name: TOTAL_TRANSACTION_AMOUNT_USD
        description: Total active transaction amount in the month, in USD.
        data_type: NUMBER
        synonyms: [total transaction amount usd, transaction volume usd, monthly volume usd]
      - name: TOTAL_TRANSACTION_AMOUNT_ILS
        description: Total active transaction amount in the month, in ILS.
        data_type: NUMBER
        synonyms: [total transaction amount ils, transaction volume ils, monthly volume ils]
      - name: TOTAL_FEE_AMOUNT_USD
        description: Total fees charged in the month, in USD.
        data_type: NUMBER
        synonyms: [total fee amount usd, monthly fees usd]
      - name: TOTAL_FEE_AMOUNT_ILS
        description: Total fees charged in the month, in ILS.
        data_type: NUMBER
        synonyms: [total fee amount ils, monthly fees ils]
      - name: TOTAL_FX_FEE_AMOUNT_USD
        description: Total FX fees charged in the month, in USD.
        data_type: NUMBER
        synonyms: [total fx fee amount usd, monthly fx fees usd]
      - name: TOTAL_FX_FEE_AMOUNT_ILS
        description: Total FX fees charged in the month, in ILS.
        data_type: NUMBER
        synonyms: [total fx fee amount ils, monthly fx fees ils]
      - name: TOTAL_DEPOSITS
        description: Total count of deposits in the month (active + cancelled).
        data_type: NUMBER
        synonyms: [total deposits, deposit count, deposits]
      - name: CANCELLED_DEPOSITS
        description: Count of cancelled deposits in the month.
        data_type: NUMBER
        synonyms: [cancelled deposits]
      - name: TOTAL_DEPOSIT_AMOUNT_USD
        description: Total deposit amount in the month, in USD.
        data_type: NUMBER
        synonyms: [total deposit amount usd, monthly deposit usd, deposit volume usd]
      - name: TOTAL_DEPOSIT_AMOUNT_ILS
        description: Total deposit amount in the month, in ILS.
        data_type: NUMBER
        synonyms: [total deposit amount ils, monthly deposit ils, deposit volume ils]
      - name: DEPOSIT_FEE_AMOUNT_USD
        description: Total deposit fees in the month, in USD.
        data_type: NUMBER
        synonyms: [deposit fee amount usd, monthly deposit fees usd]
      - name: DEPOSIT_FEE_AMOUNT_ILS
        description: Total deposit fees in the month, in ILS.
        data_type: NUMBER
        synonyms: [deposit fee amount ils, monthly deposit fees ils]
      - name: TOTAL_REMITTANCES
        description: Total count of remittances in the month (active + cancelled).
        data_type: NUMBER
        synonyms: [total remittances, remittance count, remittances]
      - name: CANCELLED_REMITTANCES
        description: Count of cancelled remittances in the month.
        data_type: NUMBER
        synonyms: [cancelled remittances]
      - name: REMITTANCE_AMOUNT_USD
        description: Total remittance (sent) amount in the month, in USD.
        data_type: NUMBER
        synonyms: [remittance amount usd, monthly remittance usd, sent amount usd]
      - name: REMITTANCE_AMOUNT_ILS
        description: Total remittance (sent) amount in the month, in ILS.
        data_type: NUMBER
        synonyms: [remittance amount ils, monthly remittance ils, sent amount ils]
      - name: REMITTANCE_FEE_AMOUNT_USD
        description: Total remittance fees in the month, in USD.
        data_type: NUMBER
        synonyms: [remittance fee amount usd, monthly remittance fees usd]
      - name: REMITTANCE_FX_FEE_AMOUNT_USD
        description: Total remittance FX fees in the month, in USD.
        data_type: NUMBER
        synonyms: [remittance fx fee amount usd, monthly remittance fx fees usd]
      - name: NEEMA_PLUS_SALARY_AMOUNT_USD
        description: Total Neema Plus salary received in the month, in USD.
        data_type: NUMBER
        synonyms: [neema plus salary amount usd, monthly salary usd, salary usd]
      - name: NEEMA_PLUS_SALARY_AMOUNT_ILS
        description: Total Neema Plus salary received in the month, in ILS.
        data_type: NUMBER
        synonyms: [neema plus salary amount ils, monthly salary ils, salary ils]
      - name: MAX_ACTIVE_TRANSACTION_AMOUNT_USD
        description: Largest single active transaction amount in the month, in USD.
        data_type: NUMBER
        synonyms: [max active transaction amount usd, largest transaction usd, max transaction usd]
      - name: MAX_ACTIVE_TRANSACTION_AMOUNT_ILS
        description: Largest single active transaction amount in the month, in ILS.
        data_type: NUMBER
        synonyms: [max active transaction amount ils, largest transaction ils, max transaction ils]
      - name: TOTAL_LOGINS
        description: Total login count across all devices in the month.
        data_type: NUMBER
        synonyms: [total logins, monthly logins, login count]
      - name: TOTAL_DEVICES
        description: Count of distinct devices used in the month.
        data_type: NUMBER
        synonyms: [total devices, monthly devices, device count]
      - name: DEVICES_TOTAL_LOGINS
        description: Array of per-device login counts for the month (each element contains device_id and login count).
        data_type: ARRAY
        synonyms: [devices total logins, logins per device, device login breakdown]
      - name: TOTAL_ACTIVE_PRODUCTS
        description: Count of distinct active products used in the month.
        data_type: NUMBER
        synonyms: [total active products, monthly active products, product count]
      - name: ACTIVE_PRODUCTS
        description: Array of distinct active product names used in the month.
        data_type: ARRAY
        synonyms: [active products, monthly products, products used]
        sample_values: [Deposit, Remittance, Card, P2P, "Currency Exchange", "Card Deposit", Withdraw, "Neema Plus", Salary, R2P]
      - name: ENGAGEMENT_CONSECUTIVE_MONTH
        description: Number of consecutive calendar months (up to and including KPI_MONTH) in which the user had any engagement — login or transaction activity.
        data_type: NUMBER
        synonyms: [engagement consecutive month, consecutive engagement months, engagement streak]
      - name: ACTIVITY_CONSECUTIVE_MONTH
        description: Number of consecutive calendar months (up to and including KPI_MONTH) in which the user had at least one active transaction.
        data_type: NUMBER
        synonyms: [activity consecutive month, consecutive active months, activity streak]
      - name: INACTIVITY_CONSECUTIVE_MONTH
        description: Number of consecutive calendar months (up to and including KPI_MONTH) without any active transaction. Resets to 0 whenever the user is active.
        data_type: NUMBER
        synonyms: [inactivity consecutive month, consecutive inactive months, inactivity streak, months inactive]
      - name: DW_UPDATE_DATE
        description: Timestamp this row was last loaded/updated by the data warehouse.
        data_type: TIMESTAMP_NTZ
        synonyms: [dw update date, etl load date, last updated]
    relationships:
      - from_model: dw_fact_user_monthly_kpis
        from_column: USER_ID
        to_model: dw_dim_user
        to_column: USER_ID
        description: Each monthly KPI row belongs to one user.
      - from_model: dw_fact_user_monthly_kpis
        from_column: NEEMA_ID
        to_model: dw_dim_user
        to_column: NEEMA_ID
        description: Alternate user join on the numeric Neema id.

  # ============================================================================
  - name: dw_fact_user_kpis
    meta:
      context_file: 05_data-and-metrics/semantic-model/dw_fact_user_kpis.yml
    database: NEEMA_BI
    schema: DW_FACT
    description: |
      Per-user KPI summary fact. One row per user holding
      pre-aggregated lifetime and last-3-month (L3M) metrics: transaction /
      deposit / remittance counts and amounts, fees, salary, logins, devices,
      and active products. Effectively a one-to-one companion to dw_dim_user
      for analytics that need ready-made user totals.
    synonyms: [user kpis, user metrics, user summary, customer kpis, fact user kpis]
    columns:
      - name: USER_ID
        description: User UUID. Primary key. Foreign key to dw_dim_user.USER_ID.
        data_type: BINARY
        synonyms: [user id, customer id]
        constraints:
          - type: primary_key
          - type: not_null
      - name: NEEMA_ID
        description: Numeric Neema id for the user. Foreign key to dw_dim_user.NEEMA_ID.
        data_type: NUMBER
        synonyms: [neema id, customer number]
      - name: TOTAL_TRANSACTIONS
        description: Lifetime count of all transactions.
        data_type: NUMBER
        synonyms: [total transactions, transaction count]
      - name: CANCELLED_TRANSACTIONS
        description: Lifetime count of cancelled transactions.
        data_type: NUMBER
        synonyms: [cancelled transactions]
      - name: ACTIVE_TRANSACTIONS
        description: Lifetime count of active (non-cancelled) transactions.
        data_type: NUMBER
        synonyms: [active transactions]
      - name: TOTAL_TRANSACTION_AMOUNT_ILS
        description: Lifetime total transaction amount, in ILS.
        data_type: NUMBER
        synonyms: [total transaction amount ils]
      - name: TOTAL_FEE_AMOUNT_USD
        description: Lifetime total fees, in USD.
        data_type: NUMBER
        synonyms: [total fee amount usd, total fees usd]
      - name: TOTAL_FEE_AMOUNT_ILS
        description: Lifetime total fees, in ILS.
        data_type: NUMBER
        synonyms: [total fee amount ils, total fees ils]
      - name: TOTAL_FX_FEE_AMOUNT_USD
        description: Lifetime total FX fees, in USD.
        data_type: NUMBER
        synonyms: [total fx fee amount usd]
      - name: TOTAL_FX_FEE_AMOUNT_ILS
        description: Lifetime total FX fees, in ILS.
        data_type: NUMBER
        synonyms: [total fx fee amount ils]
      - name: TOTAL_DEPOSITS
        description: Lifetime count of deposits.
        data_type: NUMBER
        synonyms: [total deposits, deposit count]
      - name: CANCELLED_DEPOSITS
        description: Lifetime count of cancelled deposits.
        data_type: NUMBER
        synonyms: [cancelled deposits]
      - name: TOTAL_DEPOSIT_AMOUNT_USD
        description: Lifetime total deposit amount, in USD.
        data_type: NUMBER
        synonyms: [total deposit amount usd]
